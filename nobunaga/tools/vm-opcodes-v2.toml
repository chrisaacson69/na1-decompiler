# NOBUNAGA VM OPCODE TABLE (authoritative)
#
# Source: nesdev.org forum thread t=15931 (page 2 has the complete table).
# Cross-checked against Nobunaga's $F026/$F126 dispatch table handlers.
# Same VM is used in Koei MMC1 games (Nobunaga, Genghis Khan, RoTK, FTM)
# and MMC5 games (Bandit Kings, L'Empereur) — VM core is identical, only
# the syscall dispatcher differs by mapper.
#
# Register conventions (per nesdev architecture doc):
#   $00     - 16-bit temporary
#   $02     - VM stack pointer (descending, starts $05FF)
#   $04     - VM frame pointer
#   $06     - VM instruction pointer (PC)
#   $08     - regL (left register, 16/32-bit, arithmetic destination)
#   $0C     - regR (right register, 16/32-bit, arithmetic source)
#   $10     - 32-bit temporary
#
# Frame layout (descending stack):
#   fp+17/+15/+13/+11 = args 4/3/2/1
#   fp+9/+6/+4/+2/+0  = saved IP/FP/SP/return
#   fp-2/-4/.../-24   = locals 1..12

# ======================================================================
# QUICK GROUP ($00-$7F) — operand in low nibble (0-15)
# ======================================================================

[op_00]   # $00-$0F
mnemonic = "LOADL_quick"
pops = 0
pushes = 0
description = "regL = word at frame[fast(opcode)]; codes 0-B = locals 12..1, codes C-F = args 1..4"
verified = true

[op_10]   # $10-$1F
mnemonic = "LOADR_quick"
pops = 0
pushes = 0
description = "regR = word at frame[fast(opcode)]; codes 0-B = locals 12..1, codes C-F = args 1..4"
verified = true

[op_20]   # $20-$2F
mnemonic = "STORE_quick"
pops = 0
pushes = 0
description = "word at frame[fast(opcode)] = regL"
verified = true

[op_30]   # $30-$3F
