# Nobunaga VM opcode operand-format spec
# Each entry says: this opcode (or range of opcodes) consumes these operands
# from the bytecode stream after the opcode byte.
#
# Used by vm-disasm.py to walk bytecode. Iteratively expanded as we decode
# more handlers — unknown opcodes emit as raw bytes with the handler address
# noted, telling us which routines to walk next.

[meta]
opcode_table_lo_prg = 0x3F026
opcode_table_hi_prg = 0x3F126

# --- Host calls (the bridge from bytecode to kernel) ---

[[opcode]]
op = 0xE9
name = "host_call"
operands = [
    { type = "word" },
    { type = "byte" },
]
description = "JSR to native function at <word>; ptr1 += <byte> after return"

[[opcode]]
op = 0xAC
name = "host_call_simple"
operands = [
    { type = "word" },
]
description = "JSR to native function at <word>; no ptr1 adjust"


# --- The 'load offset from ptr2' cluster (opcodes $00-$0B) ---
# Handlers at $E87F + 4*op, each loading a different immediate ($E8, $EA, ...)
# into A then falling into the common tail at $E8AD.

[[opcode]]
op_range = [0x00, 0x0B]
name = "load_ptr2_offset"
operands = []
operand_in_opcode = "low_4_bits"
description = "Load 16-bit from (ptr2 + immediate_E8_plus_op*2)"


# --- Stack push opcodes (shared-handler clusters) ---

[[opcode]]
op_range = [0x60, 0x6F]
name = "push16"
operands = []
operand_in_opcode = "low_4_bits"
description = "Push 16-bit value (high=0, low=opcode&0x0F) onto VM stack at ptr1. Decoded session 1."

[[opcode]]
op_range = [0x80, 0x8F]
name = "op_8X"
operands = []
operand_in_opcode = "low_4_bits"
description = "Shared handler at $E918; operand in low 4 bits — not yet fully decoded"

[[opcode]]
op_range = [0x50, 0x5F]
name = "set_local_0c"
operands = []
operand_in_opcode = "low_4_bits"
description = "Set $0C/$0D = low 4 bits of opcode (as 16-bit). Decoded session 1."


# --- Small-immediate opcodes with no operand ---

[[opcode]]
op_range = [0x40, 0x4F]
name = "clear_aux_ptr"
operands = []
description = "Clear $08/$09 (the VM auxiliary table pointer). Multiple opcodes in this range share the same handler — exact semantic differentiator TBD. Decoded session 1."


# --- Read-word opcodes (consume 2 bytes from bytecode) ---
# Many opcodes in $A0-$BF range call vm_read_word_into_ptr0 ($EFD5) which
# consumes 2 bytes. Adding the most common one we've seen.

[[opcode]]
op = 0xA8
name = "load_word_A8"
operands = [{ type = "word" }]
description = "Read 16-bit word from bytecode (handler $EA75 calls vm_read_word_into_ptr0). Effect on VM state TBD. Decoded session 1."

[[opcode]]
op = 0xA7
name = "load_word_A7"
operands = [{ type = "word" }]
description = "Read 16-bit word from bytecode (handler $EB0A calls vm_read_word_into_ptr0). Effect on VM state TBD. Decoded session 1."
