# Nobunaga VM opcode operand-format spec — 256/256 opcodes classified.
#
# Each entry describes the bytes the opcode consumes from the bytecode stream
# AFTER the opcode byte itself. Used by vm-disasm.py for byte-aligned walking.
#
# Naming convention:
#   - Decoded opcodes: descriptive names (push16, host_call, etc.)
#   - Auto-classified opcodes: generic op_NN names with operand format from
#     opcode-classify.py (handler-pattern recognition)
#
# Coverage status (session 2):
#   Decoded:    9 specific opcodes (host_call*, push16, clear_aux_ptr,
#               set_local_0c, load_ptr2_offset, load_word_A8/A7, trigger_syscall)
#   Auto:       247 opcodes with correct operand counts but generic names
#   Total:      256/256 byte-aligned
#
# The auto-classifier in opcode-classify.py reads each handler's first ~40
# bytes and detects calls to known operand-fetch helpers ($EFD5 reads word,
# $EF97 reads sbyte, etc.). Result is the operand-byte count, which is enough
# for byte-aligned disassembly. Semantic naming of individual opcodes remains
# session-by-session work.

[meta]
opcode_table_lo_prg = 0x3F026
opcode_table_hi_prg = 0x3F126


# ============================================================================
# DECODED OPCODES (specific names and descriptions)
# ============================================================================

# --- Host call mechanism (chapter 5) ---

[[opcode]]
op = 0xE9
name = "host_call"
operands = [
    { type = "word" },
    { type = "byte" },
]
description = "JSR to native function at <word>; ptr1 += <byte> after return"

[[opcode]]
op = 0xAC
name = "host_call_simple"
operands = [
    { type = "word" },
]
description = "JSR to native function at <word>; no ptr1 adjust"


# --- Trigger_syscall cluster (all map to handler $EF92: BRK + jmp vm_dispatch) ---
# 37 opcodes share this single behavior: execute BRK to fire syscall_dispatch
# with whatever's currently in $0050. The BRK pushes return-PC=$EF94 (which is
# JMP vm_dispatch), so after the syscall returns, the VM continues. Different
# opcode values likely group syscalls by category (audio vs PPU vs save etc.).
# We can't tell which group without runtime traces showing the task ID set
# before each opcode fires.

[[opcode]]
op = 0x80
name = "trigger_syscall_80"
operands = []
description = "BRK to syscall_dispatch (handler $EF92, shared with 36 other opcodes)"

[[opcode]]
op_range = [0x91, 0x9F]
name = "trigger_syscall_9X"
operands = []
description = "BRK to syscall_dispatch (handler $EF92)"

[[opcode]]
op = 0xCE
name = "trigger_syscall_CE"
operands = []
description = "BRK to syscall_dispatch (handler $EF92)"

[[opcode]]
op_range = [0xEB, 0xFE]
name = "trigger_syscall_EB_FE"
operands = []
description = "BRK to syscall_dispatch (handler $EF92)"


# --- Stack and aux-pointer operations (chapter 5/6) ---

[[opcode]]
op_range = [0x60, 0x6F]
name = "push16"
operands = []
operand_in_opcode = "low_4_bits"
description = "Push 16-bit (high=0, low=opcode&0x0F) to VM stack at ptr1"

[[opcode]]
op_range = [0x50, 0x5F]
name = "set_local_0c"
operands = []
operand_in_opcode = "low_4_bits"
description = "Set $0C/$0D to (high=0, low=opcode&0x0F)"

[[opcode]]
op_range = [0x41, 0x4F]
name = "clear_aux_ptr"
operands = []
description = "Set $08/$09 = 0 (shared handler $E9F6)"

[[opcode]]
op = 0x40
name = "clear_aux_ptr_40"
operands = []
description = "Set $08/$09 = 0 (own handler $EA00, same effect as $41-$4F)"

[[opcode]]
op = 0x50
name = "set_local_0c_50"
operands = []
description = "Variant of $51-$5F at handler $EA11"

[[opcode]]
op_range = [0x71, 0x7F]
name = "add_low4_to_aux_ptr"
operands = []
operand_in_opcode = "low_4_bits"
description = "Add opcode&0x0F to $08/$09 (16-bit add; shared handler $EA20)"

[[opcode]]
op = 0x70
name = "nop"
operands = []
description = "Pure no-op: handler $EA2C is just JMP vm_dispatch"


# --- Load offset opcodes ($00-$0B, chapter 5) ---

[[opcode]]
op_range = [0x00, 0x0B]
name = "load_ptr2_offset"
operands = []
operand_in_opcode = "low_4_bits"
description = "Load 16-bit from (ptr2 + small negative offset)"


# --- Common word-reading opcodes ($A7, $A8 — chapter 6 session 1) ---

[[opcode]]
op = 0xA8
name = "load_word_A8"
operands = [{ type = "word" }]
description = "Read 16-bit word from bytecode; handler $EA75"

[[opcode]]
op = 0xA7
name = "load_word_A7"
operands = [{ type = "word" }]
description = "Read 16-bit word from bytecode; handler $EB0A"


