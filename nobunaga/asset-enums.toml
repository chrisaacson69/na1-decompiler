# Asset-ID enums — named constants the decompiler substitutes for literal int args
# of "enum-typed" functions (e.g. trigger_cutscene(26) -> trigger_cutscene(CUTSCENE_BRIBE)).
# Derived 2026-06-10 from the grounded call sites (each lord command animates its own cutscene)
# + effect_ninja_sabotage's mission->cutscene mapping. [P] = probable (order-inferred, re-confirm by running).

# function name -> { arg_index = enum_table_name }  (arg_index is 0-based, pop/print order = arg1,arg2,...)
[arg_enums]
trigger_cutscene  = { 0 = "cutscene" }
call_bank10_entry = { 0 = "audio_cue" }

# cutscene/animation IDs (run_cutscene, bank 14) — id -> readable constant
[cutscene]
0  = "CUTSCENE_TRADE"
1  = "CUTSCENE_NINJA_ASSASSIN_RESULT"
2  = "CUTSCENE_SIEGE_ASSAULT"
3  = "CUTSCENE_PACT"
4  = "CUTSCENE_MARRY_ACCEPT_GOLD"
5  = "CUTSCENE_EVENT_REASSIGN50"      # [P] reassign_daimyo24_fiefs_to_owner50 (50-fief event)
6  = "CUTSCENE_GIVE"
7  = "CUTSCENE_ALLY_ACCEPT_GOLD"
8  = "CUTSCENE_MOVE"
9  = "CUTSCENE_GROW"
10 = "CUTSCENE_TRAIN"
11 = "CUTSCENE_GRANT"
12 = "CUTSCENE_NINJA_ASSASSIN"
13 = "CUTSCENE_WAR"
14 = "CUTSCENE_VIEW"
15 = "CUTSCENE_NINJA_ATTACK"          # 'someone has sent ninja against fief'
16 = "CUTSCENE_MARRY"
17 = "CUTSCENE_SEND"
18 = "CUTSCENE_TAX_DELIGHTED"         # tax lowered
19 = "CUTSCENE_TAX_PROTEST"           # tax raised
20 = "CUTSCENE_DISASTER"              # [P] decay_fief_list disaster sweep
21 = "CUTSCENE_DAM"
22 = "CUTSCENE_ASSIGN_ARMS"
23 = "CUTSCENE_AI_EVENT_23"           # [P] ai_event_build_two_batches
24 = "CUTSCENE_BUILD"
25 = "CUTSCENE_AI_EVENT_25"           # [P] ai_event_build_two_batches
26 = "CUTSCENE_BRIBE"
