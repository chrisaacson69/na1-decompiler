# bank-10 audio cue IDs (call_bank10_entry) — id -> readable constant.
# Audio is "play and listen" to confirm; only the high-confidence ones named, rest left numeric. [P] throughout.
[audio_cue]
1  = "AUDIO_UI_CONFIRM"               # [P] common: after init, sound-toggle, result jingle, vm_bootstrap
2  = "AUDIO_BATTLE_START"             # [P] battle_init_driver
7  = "AUDIO_JINGLE_FAIL"              # [P] play_result_jingle(arg!=0 -> 8 else 7)
8  = "AUDIO_JINGLE_OK"                # [P]
30 = "AUDIO_CONFLICT"                 # [P] takeover / revolt / ai-event
