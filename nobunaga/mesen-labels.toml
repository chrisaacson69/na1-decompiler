"0x9D03" = { name = "apply_pct_reduction_to_unit_strength", comment = "[CONFIRMED 2026-06-02] The combat KILL applier: reduces a $6FBC unit-slot strength (and the side's men total unit_record+4 -- which is MEN, not a damage-accum) by pct_op(arg3, *slot)=floor(arg3*strength/100), cut clamped to the field; clears the unit on reaching 0. Caller tally_unit_type_then_check_strength_parity_50 ($9DFB) splits 100% of the damage between the two engaged units by relative strength: local11 = calc_battle_strength_pct_one_side ($9D75) = math32_2arg(A,B)=100A/(A+B); defender loses local11%, attacker loses (100-local11)%. The actual troop-killing math (kills are decoupled from the rice clock $830B and the capture contest $9E73). Reverse-push arg order on the pct call -> confirm exact A/B in var-walk." }
