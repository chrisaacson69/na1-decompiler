# --- The Bytecode VM (chapter 5) ---
# Bank 15's $E823-$F225 region implements a stack-based virtual machine that interprets
# bytecode in banks 0-14. The game's logic (boot, main loop, AI, menus, combat) is all
# VM bytecode. The 23 syscalls are exposed to bytecode via VM opcode $E9 (host-call).
"0xE823" = { name = "vm_entry",             comment = "VM entry point. Called as JSR vm_entry from bank 0 ($A778) with inline bytecode following. Pulls 4 bytes off stack (return + previous context), allocates new VM frame (ptr1 -= 9), saves old context, sets up ptr3 (bytecode IP) and begins dispatching." }
"0xE867" = { name = "vm_dispatch",          comment = "VM main dispatch loop. Reads byte at ptr3 (bytecode IP), advances ptr3, looks up handler in tables at $F026/$F126, JMPs through. Handlers do their work and JMP back here (or to a tail at $EB9E that adjusts ptr1 first)." }
"0xE87F" = { name = "vm_op_00_load_offset", comment = "VM opcode $00 handler. First of 12 entries (opcodes $00-$0B) at $E87F-$E8AB, each 4 bytes apart, each loading a different immediate ($E8/$EA/.../$FE) into A then branching to the common tail at $E8AD that adds A to ptr2 and reads 16-bit data from that location." }
"0xE8AD" = { name = "vm_op_load_tail",      comment = "Common tail for VM opcodes $00-$0B. Adds immediate offset to ptr2, reads 16-bit value at the resulting address, stores it as the new VM bytecode IP base ($08/$09). Used by 'load offset from ptr2' opcode group." }
"0xEB38" = { name = "vm_op_E9_host_call",   comment = "VM opcode $E9: host call with VM stack adjustment. Reads next 2 bytecode bytes as a native function address, JSR through it (using the indirect-JMP-trampoline trick), then advances ptr1 before next dispatch. THIS IS THE BRIDGE FROM BYTECODE TO KERNEL — bytecode pattern 'E9 26 F2' = host_call to $F226 = syscall_dispatch." }
"0xEB4E" = { name = "vm_op_AC_host_call_simple", comment = "VM opcode $AC: simple host call without stack adjustment. Reads next 2 bytecode bytes as a native function address, JSR through it, then immediately dispatches the next opcode (no ptr1 adjustment). Different calling convention than $E9 (host call that returns no values to clean up)." }
"0xEB57" = { name = "vm_call_native",       comment = "VM 'JSR through ptr0' helper. Saves the VM IP onto the VM stack at ptr1, then JSRs through the indirect_jmp_trampoline ($EB7A) which executes JMP ($0000) — effectively a JSR to wherever ptr0 points. After the called native code RTS's, restores the VM stack pointer." }
"0xEB7A" = { name = "indirect_jmp_trampoline", comment = "3-byte data block '6C 00 00' = JMP ($0000). Used by vm_call_native to implement 'JSR through ptr0' which 6502 lacks natively. JSR to this block runs JMP indirect through $00/$01 (= ptr0), effectively calling whatever ptr0 points to." }
"0xEB9E" = { name = "vm_dispatch_with_ptr1_adjust", comment = "Tail used by host_call opcode $E9. Reads a byte from the bytecode as the ptr1 adjustment amount, adds it to ptr1, then enters vm_dispatch. This is the 'host call returns N bytes' cleanup convention." }
"0xEFD5" = { name = "vm_read_word_into_ptr0", comment = "VM helper: read the next 2 bytes from bytecode (at ptr3,Y=0 and ptr3,Y=1) into ptr0_lo / ptr0_hi. Advance ptr3 by 2. Used by host-call opcodes to fetch the native function address." }
"0xF026" = { name = "vm_opcode_lo_table",   comment = "256-byte table of low bytes of VM opcode handler addresses, indexed by opcode byte. The full handler is at ($F126[op] << 8) | $F026[op]." }
"0xF126" = { name = "vm_opcode_hi_table",   comment = "256-byte table of high bytes of VM opcode handler addresses, indexed by opcode byte. Together with vm_opcode_lo_table at $F026, forms the 256-entry dispatch table for VM bytecode opcodes. Immediately precedes syscall_dispatch at $F226." }
"0xF226" = { name = "syscall_dispatch",     comment = "The 22-byte parameter-copy wrapper that fakes a BRK via PHP + JMP($FFFE). Called by VM bytecode via opcode $E9 with this as the address operand. Reads syscall parameters from ($02),Y=$17..$02 — i.e. directly from the current VM frame at ptr1." }

# --- The VM 16/32-bit arithmetic runtime ($EC-$F6) + ext-op table (walked 2026-05-31) ---
# The native substrate UNDER the cracked math32 helpers. Operands live in a register file in zero page:
#   32-bit accumulator A = $08-$0B, operand B = $0C-$0F, scratch/remainder = $10-$13.
# RESOLVES the ROADMAP Inbox "B7 extended-opcode table" item: it is ext_op_table ($F263), reached via
# ext_op_dispatch ($F246) from VM opcode $AB. It was in our own disasm all along — no nesdev lookup needed.
"0xF246" = { name = "ext_op_dispatch",       comment = "Extended-opcode dispatcher (VM opcode $AB). Reads the next bytecode byte as an ext-op index, *2, indexes ext_op_table ($F263), and JMPs to the handler (pushing a return into vm_dispatch). This is the 'B7 ext-op' mechanism the math32 helpers ride on." }
"0xF263" = { name = "ext_op_table",          comment = "Extended-opcode address table (the 'B7 ext-op table' from the ROADMAP Inbox). ~44 little-endian handler addresses for the 16/32-bit math/logic/bitfield ops, indexed by ext_op_dispatch ($F246). Entry 0 = $F2C1 (umul32), then div/add/sub/cmp/bitfield/etc. DECODED from this ROM's own disasm 2026-05-31 — the external nesdev t=15931 spec was never needed." }
"0xF2C1" = { name = "umul32",                comment = "Unsigned 32-bit multiply: A($08-$0B) * B($0C-$0F) -> product accumulated in $14-block. 32-iteration shift-add (lsr A, add B to running sum on carry, ror down). ext_op_table entry $01." }
"0xF2FE" = { name = "sdiv32_setup",          comment = "Signed 32-bit divide front-end: record result sign in $40 (sign A ^ sign B) and dividend sign in $41, take |A| and |B| (via negate32_operand), then run udiv32. The signed-division ext-op." }
"0xF31C" = { name = "udiv32",                comment = "Unsigned 32-bit restoring divide: A($08-$0B) / B($0C-$0F); quotient -> $08-$0B, remainder -> $10-$13. Clears the remainder hi then runs the 32-iteration shift-subtract loop at $F328." }
"0xF427" = { name = "negate32_operand",      comment = "4-byte two's-complement negate of operand B ($0C-$0F): 0 - B. Used by the signed mul/div setups to take absolute value." }
"0xF43B" = { name = "test_nonzero32",        comment = "Boolean-ize the 32-bit accumulator: set $08:$09 = 1 if any byte of $08-$0B is nonzero, else 0. (The $F433 sibling EORs the result with 1 = logical NOT.)" }
"0xF4C3" = { name = "cmp32_a_minus_b",       comment = "4-byte compare computing A($08-$0B) - B($0C-$0F) via cmp/sbc chain, leaving N/V/C/Z for the signed+unsigned comparison opcodes. Backs the lt/le/eq family at $F467-$F4C2." }
"0xF4D6" = { name = "cmp32_b_minus_a",       comment = "Reversed-operand 4-byte compare B($0C-$0F) - A($08-$0B); the gt/ge sibling of cmp32_a_minus_b." }
"0xF5CD" = { name = "vm_bitfield_read",      comment = "Bitfield read: load the 16-bit word at ptr0[Y], shift it right by X bits (alignment), AND with an X-wide mask from make_bitmask. Extracts a packed bitfield into $08:$09." }
"0xF603" = { name = "vm_bitfield_read_test", comment = "Reads a bitfield (vm_bitfield_read) then tests it against the inverted mask (boolean result in A / $08). Exact predicate (field != all-ones vs masked-compare) to confirm on next read; behavior verified, naming descriptive." }
"0xF62C" = { name = "vm_bitfield_write",     comment = "Bitfield write/insert: build the X-wide mask (make_bitmask), shift the value left X bits, then read-modify-write the word at ptr0[Y] = (old & ~mask) | (value & mask). The packed-field setter." }
"0xF669" = { name = "make_bitmask",          comment = "Build an N-bit mask (2^N - 1) into $0A:$0B, with N passed in A (rol a 1-bit at a time). Shared helper for the bitfield read/write ops." }

# 16-bit math leaves (reached from the VM opcode tables / mul-div setup; jsr-targets walked 2026-05-31)
"0xECDB" = { name = "vm_pop_operand16",      comment = "Pop a 16-bit operand off the VM eval stack (ptr1) into operand-B low half $0C:$0D; ptr1 += 2." }
"0xED2E" = { name = "udiv16",                comment = "Unsigned 16-bit restoring divide: $08:$09 / $0C:$0D; quotient -> $08:$09, remainder -> ptr0. 16-iteration shift-subtract. (The $ECF0 sibling is the matching 16-bit multiply.)" }
"0xED7A" = { name = "sdiv16_setup_signs",    comment = "Signed-divide front-end for udiv16: store the quotient sign (A^B) in $0A, take |dividend| and |divisor| in place; paired with udiv16 at the $ED1E/$ED54 signed-div opcodes." }
"0xEF97" = { name = "vm_fetch_sbyte",        comment = "Fetch a signed immediate byte from the bytecode stream (ptr3),Y; sign-extend into X; ptr3++. clc on exit." }
"0xEFA6" = { name = "vm_addr_ptr2_plus_sbyte", comment = "Compute ptr0 = ptr2 + signed_byte(bytecode); ptr3++. 8-bit-signed-offset indexed addressing off base pointer ptr2." }
"0xEFBF" = { name = "vm_fetch_word",         comment = "Fetch a 16-bit immediate from the bytecode (ptr3): low byte in A, high byte in X; ptr3 += 2." }
"0xEFEC" = { name = "vm_addr_ptr2_plus_word", comment = "Compute ptr0 = ptr2 + word(bytecode); ptr3 += 2. 16-bit indexed addressing off base pointer ptr2 (the array-access addressing mode)." }

# --- ext_op_table HANDLERS (Session A walk, 2026-05-31) ---
# The 47 active entries of ext_op_table ($F263), each a 32-bit primitive on the register file
# (A=$08-$0B, B=$0C-$0F, scratch=$10-$13). Dispatched by ext_op_dispatch ($F246) as the word at
# $F261 + 2*N -> so N=$01 = umul32, N=$00 = $0000 (unused). Decoded from this ROM's disasm;
# the index map was cross-verified against the dispatcher addressing ($F261,X) + table bytes
# (corrects the ROADMAP's off-by-one table). Read-fan-out 2026-05-31, coordinator-verified.
# Divide / modulo family:
"0xF2F0" = { name = "sdiv32",                comment = "ext_op entry $02: signed 32-bit divide A/B. jsr sdiv32_setup (|A|,|B|, divide via fall-through to udiv32, result sign in $40), then if $40<0 jmp negate32_operand. Quotient in A." }
"0xF2FB" = { name = "udiv32_entry",          comment = "ext_op entry $2E: jmp udiv32 ($F31C) -- the unsigned-divide dispatch entry (3 bytes overlapping the rts tail of sdiv32 at $F2FA)." }
"0xF362" = { name = "umod32",                comment = "ext_op entry $2F: unsigned 32-bit remainder. jsr udiv32 (remainder->$10-$13), copy $10-$13 into A. A = A mod B, unsigned." }
"0xF36B" = { name = "smod32",                comment = "ext_op entry $1E: signed 32-bit remainder. jsr sdiv32_setup, copy remainder->A, if dividend sign ($41)<0 negate. A = A mod B, sign of dividend." }
# Arithmetic (NB: add32/sub32 write operand B, not accumulator A):
"0xF37F" = { name = "add32",                 comment = "ext_op entry $03: 32-bit add B += scratch. B($0C-$0F) = B + scratch($10-$13). (Targets B, the operand slot -- unlike the bitwise ops which target A.)" }
"0xF38C" = { name = "sub32",                 comment = "ext_op entry $04: 32-bit subtract B -= scratch. B($0C-$0F) = B - scratch($10-$13)." }
"0xF399" = { name = "shl32_var",             comment = "ext_op entry $1F: variable left shift. A($08-$0B) <<= count($10-$13) (decrement-count loop of asl/rol)." }
"0xF3B5" = { name = "shr32_var_arith",       comment = "ext_op entry $20: variable arithmetic (sign-preserving) right shift. A >>= count($10-$13), sign-extended." }
"0xF3DB" = { name = "shr32_var_logical",     comment = "ext_op entry $2D: variable logical (zero-fill) right shift. A = A >>> count($10-$13)." }
# Bitwise:
"0xF3F7" = { name = "not32",                 comment = "ext_op entry $21: bitwise complement. A = ~A (one's complement, 32-bit; eor #$ff x4)." }
"0xF403" = { name = "and32",                 comment = "ext_op entry $22: bitwise AND. A = A & B (32-bit)." }
"0xF40F" = { name = "or32",                  comment = "ext_op entry $23: bitwise OR. A = A | B (32-bit)." }
"0xF41B" = { name = "xor32",                 comment = "ext_op entry $24: bitwise XOR. A = A ^ B (32-bit)." }
"0xF433" = { name = "logical_not32",         comment = "ext_op entry $28: jsr test_nonzero32 then eor #$01 on $08 -> boolean !A (1 if A==0 else 0)." }
# Comparisons (boolean 0/1 into $08:$09; call the cmp32_a_minus_b / cmp32_b_minus_a cores):
"0xF446" = { name = "cmp32_eq",              comment = "ext_op entry $06: A == B ? 1 : 0 (inline byte compare $08-$0B vs $0C-$0F; sign-agnostic)." }
"0xF457" = { name = "cmp32_ne",              comment = "ext_op entry $07: A != B ? 1 : 0 (inline byte compare)." }
"0xF467" = { name = "cmp32_a_lt_b_signed",   comment = "ext_op entry $08: A < B signed. cmp32_a_minus_b, result = N eor V." }
"0xF475" = { name = "cmp32_a_lt_b_unsigned", comment = "ext_op entry $29: A < B unsigned. cmp32_a_minus_b, result = C==0 (borrow)." }
"0xF47E" = { name = "cmp32_a_gt_b_signed",   comment = "ext_op entry $0A: A > B signed. cmp32_b_minus_a, result = N eor V of B-A." }
"0xF48C" = { name = "cmp32_a_gt_b_unsigned", comment = "ext_op entry $2B: A > B unsigned. cmp32_b_minus_a, C==0 of B-A." }
"0xF495" = { name = "cmp32_a_le_b_signed",   comment = "ext_op entry $09: A <= B signed. cmp32_b_minus_a, inclusive (bmi) -> B>=A." }
"0xF4A3" = { name = "cmp32_a_le_b_unsigned", comment = "ext_op entry $2A: A <= B unsigned. cmp32_b_minus_a, C==1 -> B>=A." }
"0xF4AC" = { name = "cmp32_a_ge_b_signed",   comment = "ext_op entry $0B: A >= B signed. cmp32_a_minus_b, inclusive (bmi) -> A>=B." }
"0xF4BA" = { name = "cmp32_a_ge_b_unsigned", comment = "ext_op entry $2C: A >= B unsigned. cmp32_a_minus_b, C==1 -> A>=B." }
# Sign-extend + register/stack moves:
"0xF4E9" = { name = "sign_extend16_to_32",   comment = "ext_op entry $25: sign-extend the 16-bit value in $08:$09 to 32-bit A (fill $0A:$0B with $00/$FF from bit15)." }
"0xF4EF" = { name = "clear_a_high16",        comment = "ext_op entry $26: sty $0a/$0b -- zero (or Y-fill) the high half of A. Also the fall-through tail of sign_extend16_to_32." }
"0xF4F3" = { name = "ext_op_nop",            comment = "ext_op entry $27: bare rts -- no-op handler." }
"0xF4F4" = { name = "load_a32_from_ptr3",    comment = "ext_op entry $18: copy 4 bytes (ptr3),Y=0..3 -> A($08-$0B); reads a 32-bit inline operand and advances ptr3 by 4." }
"0xF500" = { name = "load_b32_from_ptr3",    comment = "ext_op entry $19: copy 4 bytes (ptr3),Y=0..3 -> B($0C-$0F); twin of load_a32_from_ptr3 targeting B." }
"0xF515" = { name = "halve_a32_rounded",     comment = "ext_op entry $1C: arithmetic divide-by-2 of A (ror/rol carry chain across $08-$0B with a sign/round seed). MED-confidence: exact rounding/sign semantic not fully traced." }
"0xF51A" = { name = "halve_a32",             comment = "ext_op entry $1B: divide-by-2 of A (shares the $F515 shift body at a different carry seed). MED-confidence." }
"0xF531" = { name = "store_a32_via_popped_ptr", comment = "ext_op entry $17: jsr vm_pop_operand16 (dest ptr into $0C:$0D), then store A($08-$0B) through it." }
"0xF53F" = { name = "swap_a_b32",            comment = "ext_op entry $1A: exchange A($08-$0B) with B($0C-$0F), 4 bytes." }
"0xF54D" = { name = "load_a32_from_addr",    comment = "ext_op entry $0C: jsr vm_addr_ptr2_plus_word (eff. addr -> ptr0), then load (ptr0) -> A($08-$0B). Body at $F550 reused by $F57C/$F5C2." }
"0xF55B" = { name = "load_b32_from_addr",    comment = "ext_op entry $0D: jsr vm_addr_ptr2_plus_word, then load (ptr0) -> B($0C-$0F). Body at $F55E reused by $F581." }
"0xF569" = { name = "store_a32_to_addr",     comment = "ext_op entry $0E: jsr vm_addr_ptr2_plus_word, then store A -> (ptr0). Body at $F56C reused by $F586." }
"0xF577" = { name = "store_a32_to_addr_or_push", comment = "ext_op entry $0F: jsr vm_addr_ptr2_plus_word; carry selects push-A-onto-VM-stack ($F58E) vs store. MED-confidence: carry-variant semantic not fully traced." }
"0xF57C" = { name = "load_a32_indirect",     comment = "ext_op entry $10: jsr vm_read_word_into_ptr0 (deref a word into ptr0); carry-clear -> load_a32_from_addr body ($F550). MED-confidence." }
"0xF581" = { name = "load_b32_indirect",     comment = "ext_op entry $11: jsr vm_read_word_into_ptr0; carry-clear -> load_b32_from_addr body ($F55E). MED-confidence." }
"0xF586" = { name = "store_a32_indirect",    comment = "ext_op entry $12: jsr vm_read_word_into_ptr0; carry-clear -> store_a32_to_addr body ($F56C). MED-confidence." }
"0xF58B" = { name = "push_value32_to_vm_stack", comment = "ext_op entry $13: jsr vm_read_word_into_ptr0, fall into $F58E: ptr1 -= 4, copy (ptr0) -> (ptr1). Pushes a 32-bit value onto the VM operand stack." }
"0xF5A3" = { name = "push_a32_to_vm_stack",  comment = "ext_op entry $14: ptr0 = $0008 (address of A), jmp $F58E push primitive. Pushes accumulator A onto the VM operand stack." }
"0xF5AC" = { name = "pop_b32_from_vm_stack", comment = "ext_op entry $15: copy (ptr1),Y=3..0 -> B($0C-$0F), then ptr1 += 4. Pops a 32-bit value off the VM operand stack into B." }
"0xF5C2" = { name = "load_a32_via_a_ptr",    comment = "ext_op entry $16: ptr0 = low 16 bits of A, jmp load_a32_from_addr body ($F550). Dereferences A-as-pointer into A." }
# Shared inner bodies / VM-stack push tails (jmp-reached, not table entries; Session B):
"0xF008" = { name = "vm_push16_AX",          comment = "Shared 16-bit VM-stack push tail: ptr1 -= 2, store A (low) then X (high) at (ptr1), jmp vm_dispatch. 8 opcode handlers jmp here after computing a 16-bit result in A:X. The 16-bit analog of the $F58E push32 tail." }
