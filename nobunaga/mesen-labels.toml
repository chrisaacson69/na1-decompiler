# --- The command driver table ---
"0xB9B2" = { name = "command_driver_table", comment = "34-entry pointer table — entry N points to the bytecode subroutine that drives menu command N+1. Entries 0-20 are the 21 lord commands, 21-33 are sub-handlers reachable from within those drivers. See command-table.txt for the full listing. Chapter 9's foundational find." }

# --- The 21 command drivers (in-game menu order) ---
"0x96D1" = { name = "driver_move",          comment = "[HIGH CONFIRMED 2026-06-10] Move command (cmd 1): requires men (effect_war_combat_prep_b); filters the player's own provinces, province_select_helper/prompt for the destination, then relocates troops (effect_move blends unit quality)." }
"0x9850" = { name = "driver_war",           comment = "[HIGH CONFIRMED 2026-06-10] War command (cmd 2): capital-only + not-too-weak (prep_d); requires gold/rice/men (prep_c/a/b); marks relations (effect_war_e); province_select for the target fief, then launches the battle. The main offensive command." }
"0x999A" = { name = "driver_tax",           comment = "[HIGH CONFIRMED 2026-06-10] Tax command (cmd 3): shows current fief_tax_rate ($6D2D), number_input new rate (cap 30 if keyed-daimyo defender else 100); peasant reaction (protesting cutscene 19 if raised); calls effect_tax. Chapter 11." }
"0x9A5D" = { name = "driver_send",          comment = "[HIGH CONFIRMED 2026-06-10] Send command (cmd 4): build_eligible_province_list, province_select_helper/prompt for the destination, then transfers rice/gold to it (effect_send caps the amount)." }
"0x9B7E" = { name = "driver_dam",           comment = "[HIGH CONFIRMED 2026-06-10] Dam command (cmd 5): blocks if no peasants/output ($7009) or at the dam limit ($7001+10 dams field >= 100) (the at-our-limit message); else prompts spend, debits gold, and applies effect_dam + add_effect_gain_clamped to the dams field. Two-effect command." }
"0x9C4F" = { name = "driver_pact",          comment = "[HIGH CONFIRMED 2026-06-10] Pact command (cmd 6): build_eligible_province_list, province_select for the target fief; spends a point of the daimyo DRIVE (record +2) and forms a non-aggression pact." }
"0x9D3D" = { name = "driver_grow",          comment = "[HIGH CONFIRMED 2026-06-10] Grow command (cmd 7): blocks if at limit ($7001+24 cap <= +8 output) ('we're at our limit') or no gold; else 'spend how much on output', number_input(1, gold), debits gold and calls effect_grow. The fully-traced reference command (Chapter 9)." }
"0x9DC4" = { name = "driver_marry",         comment = "[HIGH CONFIRMED 2026-06-10] Marry command (cmd 8): capital-only; build_fiefs_excluding_daimyo, province_select for the target fief; spends a point of daimyo DRIVE (record +2); alliance-by-marriage (outcome not guaranteed)." }
"0xA1B6" = { name = "driver_trade",         comment = "[HIGH CONFIRMED 2026-06-10] Trade command (cmd 9): if effect_trade() (merchant present / port fief), draws the 6-item trade submenu (buy/sell rice/arms/men) in the right panel and dispatches. Chapter 11." }
"0xA5F4" = { name = "driver_hire",          comment = "[HIGH CONFIRMED 2026-06-10] Hire command (cmd 10): requires gold (effect_war_combat_prep_c); recruit-which prompt Men/Ninja -> effect_hire_men (recruit soldiers, dilute army stats) or effect_ninja_sabotage (covert mission)." }
"0xA637" = { name = "driver_train",         comment = "[HIGH CONFIRMED 2026-06-10] Train command (cmd 11): if skill ($7001+20) < cap (+24); needs men (+16) else 'you have no soldiers' + clear_military_stats_if_no_men; else cutscene 10, effect_train (skill += rng), clamp skill to cap. Chapter 10+11." }
"0xA6C7" = { name = "driver_view",          comment = "[HIGH CONFIRMED 2026-06-10] View command (cmd 12/19): build_eligible_province_list; views own fief stats or (if gold >= 10 and targets exist) spies on an enemy fief's stats. Calls effect_view_a / effect_view_defending_province." }
"0xA853" = { name = "driver_build",         comment = "[HIGH CONFIRMED 2026-06-10] Build command (cmd): blocks if at the town limit ($7001+24 cap <= +4 town) (we-are-at-our-limit) or no gold; else spend-how-much prompt, debits gold, calls effect_build (raises the town field). Confirms $7001+4 = town." }
"0xAA1F" = { name = "driver_give",          comment = "[HIGH CONFIRMED 2026-06-10] Give command (cmd): effect_give_a + effect_give_c eligibility (gold/rice/peasants/men); if a resource is givable, prompts the type and recipient and applies give_transfer_apply (which develops the recipient)." }
"0xAAAE" = { name = "driver_bribe",         comment = "[HIGH CONFIRMED 2026-06-10] Bribe command (cmd 15): requires gold > 10; build_eligible_province_list, province_select for the target enemy fief, then effect_bribe (siphons the enemy's output if the loyalty/charisma contest succeeds)." }
"0xAD67" = { name = "driver_assign",        comment = "[HIGH CONFIRMED 2026-06-10] Assign command (cmd): needs men ($7001+16) else you-have-no-soldiers; needs >= 30 gold, then effect_assign(30) (the arms editor) and debits 30 gold on commit." }
"0xADB3" = { name = "driver_rest",          comment = "[HIGH CONFIRMED 2026-06-10] Rest command (cmd 17): only at the capital (fief_is_daimyo_capital) — number_input(1,10) seasons -> rest_turns_remaining[owner], 'it will do you good' + cutscene 32; else show_not_home_fief. Skips turns to recover." }
"0xAF38" = { name = "driver_map",           comment = "[HIGH CONFIRMED 2026-06-10] Map command: repaint_screen, render the selected province's map section (via province_to_map_section_17/50 table), then browse_map_sections to scroll the strategic map." }
"0xAF66" = { name = "driver_grant",         comment = "[HIGH CONFIRMED 2026-06-10] Grant command (cmd 19): capital-only (else show_not_home_fief); build_eligible_province_list and a province-select loop to grant/appoint a fief to a retainer." }
"0xB23E" = { name = "driver_other",         comment = "[HIGH CONFIRMED 2026-06-10] Other command (cmd 20): draws the 7-item settings submenu (msg_change_which), submenu_prompt(7), and dispatches to the setting_* handlers (sound/animation/speed/save/watch + save/end-game). Chapter 11." }
"0xB2A1" = { name = "driver_pass",          comment = "[HIGH CONFIRMED 2026-06-10] Pass command driver (cmd 21): message_display(msg_what_a_waste) + confirm_prompt; returns 1. Ends the fief's turn without acting. Chapter 11." }

# --- Sub-handlers (driver-table indices 21-33) ---
"0x9F04" = { name = "effect_loan",      comment = "[HIGH CONFIRMED 2026-06-10] Loan command (driver 21): if gold is at the treasure-room cap (gold >= header) refuse (treasure room already full); else compute the max loan via ratio_times10_capped(town-debt, loan_rate+10, header-gold), number_input, and take it (effect_take_loan adds the interest to debt). (was subhandler_9F04.)" }
"0x9FAF" = { name = "prompt_repay_debt", comment = "[HIGH CONFIRMED 2026-06-10] Debt-repayment handler (driver-table 22): message_display(prompt); if the record has debt (arg1->debt) and gold (*arg1), number_input(1, min(debt, gold)) for the amount, then gold -= amount and arg1->debt -= amount; returns 1 on a paid amount, 0 on cancel. (was 'subhandler_9FAF'.)" }
"0xA003" = { name = "effect_sell_rice",      comment = "[HIGH CONFIRMED 2026-06-10] Sell-rice command (driver 23): max = ratio_times10_capped(header-gold, gold_rice_exchange_rate, rice); how-much-rice-will-you-sell, number_input; effect_sell_rice_for_gold(n), clamp gold, cycle_economy_rate(1). Pairs with effect_buy_rice. (was subhandler_A003.)" }
"0xA068" = { name = "effect_buy_rice",      comment = "[HIGH CONFIRMED 2026-06-10] Buy-rice effect (driver 24): if province has gold, max = ratio_times10_capped(gold, gold_rice_exchange_rate, header-rice), 'how much rice will you buy', number_input; gold -= math32_muladddiv(exchange_rate, n), rice += n, clamp_amount_to_province_max(rice). (was 'subhandler_A068'.)" }
"0xA113" = { name = "effect_buy_arms",      comment = "[HIGH CONFIRMED 2026-06-10] Buy-arms/weapons effect (driver 25): 'weapons for who?' if no men; else max = ratio_times10_capped(gold, arms_buy_price_rate, header-arms), 'how many', number_input; gold -= cost, arms += n. (was 'subhandler_A113'; calls amount_div_force_factor $A0ED.)" }
"0xA1AF" = { name = "noop_command_handler",  comment = "[HIGH CONFIRMED 2026-06-10] Do-nothing command handler: returns 0 (body is just clearA + vm_return). Occupies driver-table indices 26 and 33 — the disabled/reserved command slots. (was 'subhandler_A1AF'.)" }
"0xB066" = { name = "setting_sound_on_off",      comment = "[HIGH CONFIRMED 2026-06-10] Settings-menu Sound toggle (driver 27): message_display(msg_sound), prompt_ab_window(msg_on_off); B-cancel returns; else audio_wait_gate = choice, and stop audio (syscall_audio_control(0,0)) if Off, else call_bank10_entry(1)." }
"0xB09D" = { name = "setting_animation_on_off",  comment = "[HIGH CONFIRMED 2026-06-10] Settings-menu Animation toggle (driver 28): message_display(msg_animation), prompt_ab_window(msg_on_off); sets ai_turn_flags bit 2 (|4 on, &~4 off) — the battle-animation flag." }
"0xB0D2" = { name = "setting_message_wait_speed", comment = "[HIGH CONFIRMED 2026-06-10] Settings-menu message-wait/speed (driver 29): shows current speed sqrt(delay_loop_count/2), number_input(1,10); sets delay_loop_count = (n*n)<<1 (= 2*n^2). The message/game pacing knob." }
"0xB109" = { name = "setting_save_game",         comment = "[HIGH CONFIRMED 2026-06-10] Settings-menu Save (driver 30): 'are you sure' prompt_y_n; on yes sets sram_save_pending_flag=1 + 'game will save at end of season' + confirm_prompt. Deferred save." }
"0xB12B" = { name = "setting_watch_battles",     comment = "[HIGH CONFIRMED 2026-06-10] Settings-menu watch-other-battles toggle (driver 31): message_display(msg_watch_others_battle), prompt_ab_window(msg_y_n); B-cancel keeps current, else ui_confirm_flag_6e7d = choice." }
"0xB14B" = { name = "command_end_game",      comment = "[HIGH CONFIRMED 2026-06-10] End-game/resign command (driver 32): 'do you really want to end the [game]' prompt_y_n; on yes, increment_ai_player_count, and if ai_turn_flags bit7 (abort/game-over gate) shows the 'game over' screen + hangs; else resigns the player's province. (was 'subhandler_B14B'.)" }

# --- The 28 EFFECT handlers (each called by exactly one driver) ---
# These are where the arithmetic lives. Driver does UI + preconditions + cost
# debit; effect does the stat math. Names follow command_effect_NAME convention.
"0x87F0" = { name = "effect_grow",          comment = "[HIGH CONFIRMED 2026-06-10] Grow (develop) command effect: guard amount<1; gain = 2 * math32_3arg(amount, 6-const_two, sqrt_int(fief->output+amount)) = 2*amount*(6-skill)/sqrt(output+amount) (const_two = skill level 1-5, so higher skill = less gain); min 1; clamp to headroom (fief->header - fief->output); flat 100 if gain/2>output else math32_2arg refinement; drains loyalty + dams; output += gain. Returns gain/2 for display. The canonical Grow formula (chapter 9)." }
"0x88A6" = { name = "effect_build",         comment = "[HIGH CONFIRMED 2026-06-10] Build (town) command effect: guard amount<1; gain = math32_3arg(amount, 6-const_two, sqrt_int(fief->town + amount)) (min 1), capped at headroom (header-town); fief->town += gain. The Grow shape applied to the TOWN field; const_two = skill." }
"0x87D8" = { name = "effect_dam",           comment = "[HIGH CONFIRMED 2026-06-10] Dam (flood-control) command effect: returns 0x2710 (10000, the no-data sentinel) if the fief's output is 0, else sqrt_int(output) — the dam benefit scales with sqrt(output). Two-step command (driver also calls helper_dam_rounding $887D)." }
"0x887D" = { name = "add_effect_gain_clamped",  comment = "[HIGH CONFIRMED 2026-06-10] Applies an effect gain to a province field: gain = arg1, halved (round-up) if fief_owner_weakness(selected_province); *arg2 += gain; then clamp_amount_to_province_max(arg2). The layered 'capped add' on top of the sqrt-driven main gain, used by Dam + Build. (was 'helper_dam_rounding'.)" }
"0x82D6" = { name = "effect_tax",           comment = "[HIGH CONFIRMED 2026-06-10] Applies a signed tax_delta percent to a stat: delta% = pct_op(stat, abs16(tax_delta)); returns stat - delta% if tax_delta<0 (decrease) else stat + delta% (increase). Called twice from driver_tax (rate-set + peasantry-reaction)." }
"0x8BE5" = { name = "effect_send",          comment = "[HIGH CONFIRMED 2026-06-10] Send (gift/transfer) effect: returns min_word(ceiling - current, budget) — the amount that can be sent = the gap to the destination's ceiling, capped at the sender's available budget." }
"0x8CA5" = { name = "effect_move",          comment = "[HIGH CONFIRMED 2026-06-10] Move command: relocates `amount` men from the donor (selected_province) to the target (battle_defending_province) — both men fields at record +$7011 (+16). First blends the 3 unit-quality stats (morale/skill/arms) into the target via scaled_force_transfer weighted by the moving men, then target.men += amount, donor.men -= amount." }
"0x8A15" = { name = "effect_trade",         comment = "[HIGH CONFIRMED 2026-06-10] Trade availability: the two port fiefs (13 & 14 in the 17-fief scenario; 30 & 32 in the 50-fief) always allow trade (return 1); otherwise gated on ai_turn_flags bit 0 (the per-period trade flag)." }
