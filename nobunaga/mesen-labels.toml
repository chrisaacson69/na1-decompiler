# --- The 28 EFFECT handlers (each called by exactly one driver) ---
# These are where the arithmetic lives. Driver does UI + preconditions + cost
# debit; effect does the stat math. Names follow command_effect_NAME convention.
"0x87F0" = { name = "effect_grow",          comment = "Grow effect (chapter 9 reference decode). Args: arg1=record_ptr, arg2=gold_amount. Spine: guard amount<1; sqrt(output+amount); -2 (const_two); $D6B8 32-bit math; <<1; clamp to (header-output) headroom; flat-100 branch if gain/2>output else $D6DE refinement; $D70D drain LOYALTY; $D70D drain DAMS; output += gain. Returns gain/2 for driver to display." }
"0x88A6" = { name = "effect_build",         comment = "Build effect (this session, structural diff against effect_grow). Same five-phase shape. Differences: operates on TOWN (record+4) not OUTPUT, headroom is header-TOWN, drains WEALTH (record+14) not LOYALTY/DAMS, has a secondary TOWN bump via helper_dam_rounding ($887D)." }
"0x87D8" = { name = "effect_dam",           comment = "Dam effect (primary). Two-step command — driver calls this AND helper_dam_rounding ($887D)." }
"0x887D" = { name = "helper_dam_rounding",  comment = "Secondary effect used by both driver_dam and effect_build. Does integer-divide-with-rounding-up, then `field += quotient`, then calls $82AC. Produces the 'capped add' increment on top of the main sqrt-driven gain. Used twice on the lord-command menu — anywhere there's a layered increment." }
"0x82D6" = { name = "effect_tax",           comment = "Tax effect. Called twice from driver_tax — once for the rate-set, once for the peasantry-reaction result message (protesting/delighted)." }
"0x8BE5" = { name = "effect_send",          comment = "Send effect. Apply rice/gold transfer between own provinces." }
"0x8CA5" = { name = "effect_move",          comment = "Move effect. Apply troop relocation between own provinces." }
"0x8A15" = { name = "effect_trade",         comment = "Trade effect (buy/sell with merchant)." }
"0xA2D2" = { name = "effect_ninja_sabotage", comment = "Hire->Ninja path (driver_hire $A5F4 routes here). Hire a ninja (gold cost via hire_gold_rate $6E13, math32_muladddiv), pick target fief (msg_send_where), pick mission via msg_uprisng_2_revolt_3_dams_4_assa $BD8F: 1-Uprising (drain loyalty+wealth, anim 28) / 2-Revolt (morale, anim 27) / 3-Dams (dams+rice, anim 30) / 4-Assassin (ninja_mission_resolve_vs_defender $918D, gated by daimyo-present $6DA2) / 5-Arson (town). Field drains via hire_stat_drain_rng; failure -> msg_your_ninja_failed. WAS MISLABELED 'effect_hire' (the substance is sabotage, not recruiting); the recruit-MEN path of Hire is effect_hire_variant_pay $A553. Chapter 11." }
"0x9586" = { name = "effect_train",         comment = "Train effect. Raises lord skill against header-derived cap. Chapter 10." }
"0x8D4D" = { name = "effect_bribe",         comment = "Bribe effect. Like Grow but pointed at a target's fields." }
"0xAC11" = { name = "effect_assign",        comment = "Assign effect. Places a retainer." }
"0x83FA" = { name = "effect_view_a",        comment = "View effect, variant A (4 sub-effects total for View — own vs others, spy variants)." }
"0x85EA" = { name = "effect_view_b",        comment = "View effect, variant B." }
"0x85A7" = { name = "effect_view_c",        comment = "View effect, variant C." }
