# Mesen 2 labels for Nobunaga's Ambition (NES, USA, 1989).
# Source of truth for all named addresses discovered across the annotation chapters.
# Apply with:  python ../tools/mesen-labels.py mesen-labels.toml

[meta]
rom_name = "Nobunaga's Ambition (USA)"
prg_bank_size = 0x4000     # 16 KB MMC1 banks
prg_bank_count = 16        # 256 KB total


# ============================================================================
# Zero-page and main RAM ($0000-$07FF, CPU-visible)
# ============================================================================

[ram]

# --- Shared scratch pointer pool / VM machine registers (chapter 2; renamed 2026-05-31) ---
# These ZP pointer pairs got descriptive names by their DOMINANT/owning role. ptr0 stays
# generic (it is genuinely project-wide scratch); ptr1/2/3 are the VM's machine registers
# (the VM owns them, though a few kernel syscalls transiently borrow ptr1 as scratch).
# NOTE: older comments elsewhere in this file still use the "ptr1/ptr2/ptr3" shorthand;
# the mapping is ptr1=vm_sp, ptr2=vm_fp, ptr3=vm_ip, ptr0=scratch_ptr.
"0x0000" = { name = "scratch_ptr_lo",     comment = "General-purpose ZP scratch pointer LO (project-wide default; 13 of 16 banks touch this). In the VM = computed-address + indirect-call target (was ptr0). Kept generic deliberately -- NOT VM-exclusive." }
"0x0001" = { name = "scratch_ptr_hi",     comment = "General-purpose ZP scratch pointer HI (was ptr0)." }
"0x0002" = { name = "vm_sp_lo",           comment = "VM operand-stack pointer LO (was ptr1). Reset-inits to $FF -> $05FF stack base; VM frame alloc does vm_sp -= 9; syscall_dispatch reads params via (vm_sp),Y. CAVEAT: a few kernel syscalls (e.g. sram checksum $C5AA) transiently borrow $02/$03 as a scratch pointer." }
"0x0003" = { name = "vm_sp_hi",           comment = "VM operand-stack pointer HI (was ptr1); reset-init to $05." }
"0x0004" = { name = "vm_fp_lo",           comment = "VM frame-base pointer LO (was ptr2). Frame-local address = vm_fp + signed offset (the local/array access base; see vm_addr_ptr2_plus_word/sbyte)." }
"0x0005" = { name = "vm_fp_hi",           comment = "VM frame-base pointer HI (was ptr2)." }
"0x0006" = { name = "vm_ip_lo",           comment = "VM bytecode instruction-pointer LO (was ptr3). The dispatch loop does lda (vm_ip),Y / inc vm_ip to fetch opcodes + inline operands. Second-busiest indirect after scratch_ptr." }
"0x0007" = { name = "vm_ip_hi",           comment = "VM bytecode instruction-pointer HI (was ptr3)." }

# --- PPU pipeline pointers (chapter 2) ---
"0x001C" = { name = "ppu_queue_a_lo",     comment = "Pointer LO into $0020 (PPU upload queue A?); reset-init = $20" }
"0x001D" = { name = "ppu_queue_a_hi",     comment = "Pointer HI; reset-init = $00 (forms $0020)" }
"0x001E" = { name = "ppu_queue_b_lo",     comment = "Pointer LO into $0030 (queue B?); reset-init = $30" }
"0x001F" = { name = "ppu_queue_b_hi",     comment = "Pointer HI; reset-init = $00 (forms $0030)" }

# --- BRK dispatcher state (chapters 1, 2) ---
"0x0050" = { name = "brk_dispatch_id",    comment = "Task ID for next BRK; IRQ handler reads this and indirect-JMPs through $C173+id*3" }
"0x0066" = { name = "brk_scratch_lo",     comment = "Cleared on every BRK dispatch entry" }
"0x0067" = { name = "brk_scratch_hi",     comment = "Cleared on every BRK dispatch entry" }
"0x0068" = { name = "brk_jmp_target_lo",  comment = "IRQ-computed indirect JMP target LO; reused later as general data-pointer LO (byte-meaning-by-context)" }
"0x0069" = { name = "brk_jmp_target_hi",  comment = "IRQ-computed indirect JMP target HI; reused as data-pointer HI" }

# --- Controller poll (chapter 3) ---
"0x006E" = { name = "p1_buttons",         comment = "P1 held buttons (ABSS UDLR, MSB-first); written by controller_poll ($C628) every NMI" }
"0x006F" = { name = "p2_buttons",         comment = "P2 held buttons (same format)" }

# --- PPU register shadows (chapter 3) ---
"0x0071" = { name = "ppuctrl_shadow",     comment = "PPUCTRL ($2000) shadow; the codebase never reads $2000 directly. Managed by $C6A6 ($C54F/nmi_off, $C68A/nmi_on)." }
"0x0072" = { name = "ppumask_shadow",     comment = "PPUMASK ($2001) shadow; managed by $C570 ($C567/rendering_on, $C69D/rendering_off)." }
"0x0073" = { name = "kernel_var_73",      comment = "Cleared at reset; used by $C6AD (the BRK multiply-by-3 helper)" }

# --- Subsystem flags and counters (chapters 1, 2, 3) ---
"0x0074" = { name = "palette_dirty",      comment = "Non-zero = palette upload pending; $C6D4 uploads $0700-$071F to PPU $3F00-$3F1F then clears this" }
"0x0079" = { name = "music_voice_idx",    comment = "Outer-loop voice index (0-4) during music driver scan" }
"0x007A" = { name = "music_ptr_lo",       comment = "Pointer LO into current voice record at $0734+N*9 ($7A/$7B)" }
"0x007B" = { name = "music_ptr_hi",       comment = "Pointer HI into current voice record" }
"0x0080" = { name = "skip_vblank_wait",   comment = "Non-zero = $C537 (wait-for-VBlank) returns immediately without spinning" }
"0x0081" = { name = "nmi_busy",           comment = "Semaphore: foreground sets to 1, spin-waits for NMI to clear it. The 'wait for VBlank' handshake." }
"0x0083" = { name = "clock_a_hi",         comment = "16-bit wall-clock A high byte; NMI adds +2 every frame (gated by $89); reset = $04 (init $04D2 = 1234)" }
"0x0084" = { name = "clock_a_lo",         comment = "Wall-clock A low byte; reset = $D2" }
"0x0085" = { name = "clock_b_hi",         comment = "16-bit wall-clock B high byte; reset = $04" }
"0x0086" = { name = "clock_b_lo",         comment = "Wall-clock B low byte; reset = $D2" }
"0x0089" = { name = "skip_wallclock",     comment = "Non-zero = NMI does OAM/audio/input but skips the wall-clock tick" }
"0x00B0" = { name = "nmi_skip_all",       comment = "Non-zero = NMI bails after OAM DMA (skips controller/palette/audio/clock)" }

# --- Music driver state ($0720-$0760, chapter 3 + runtime trace) ---
"0x0720" = { name = "audio_mute_triangle", comment = "Non-zero = triangle channel writes suppressed (for sound-effect ducking)" }
"0x0721" = { name = "audio_active_v0",     comment = "Voice 0 active flag (always $01 during song playback)" }
"0x0722" = { name = "audio_active_v1",     comment = "Voice 1 active flag" }
"0x0723" = { name = "audio_active_v2",     comment = "Voice 2 active flag" }
"0x0724" = { name = "audio_active_v3",     comment = "Voice 3 active flag" }

# Voice config array: 5 × 3-byte records starting at $0725, written by audio_load_voice (task $09).
# Chapter 3 mis-identified $0730-$0733 as a "song header" — they are actually the tail of voices 3-4 here.
# Each 3-byte record: { tempo_divider, song_ptr_lo, song_ptr_hi } per voice.
"0x0725" = { name = "v0_config",           comment = "Voice 0 config (3 bytes: tempo_div, song_ptr_lo, song_ptr_hi); written by audio_load_voice ($C3AD)" }
"0x0728" = { name = "v1_config",           comment = "Voice 1 config (3 bytes)" }
"0x072B" = { name = "v2_config",           comment = "Voice 2 config (3 bytes)" }
"0x072E" = { name = "v3_config",           comment = "Voice 3 config (3 bytes)" }
"0x0731" = { name = "v4_config",           comment = "Voice 4 config (3 bytes)" }

# Voice slots: 5 records × 9 bytes starting at $0734.
# Per-record fields (offsets 0-8): trigger / vol-duty / sweep / timer-lo / timer-hi / tempo-div / ptr-lo / ptr-hi / countdown.
"0x0734" = { name = "v0_trigger",          comment = "Voice 0 byte 0: 1-4 = play on channel; 5-8 = just played (dormant); 0 = idle" }
"0x073D" = { name = "v1_trigger",          comment = "Voice 1 byte 0 (same encoding)" }
"0x0746" = { name = "v2_trigger",          comment = "Voice 2 byte 0" }
"0x074F" = { name = "v3_trigger",          comment = "Voice 3 byte 0" }
"0x0758" = { name = "v4_trigger",          comment = "Voice 4 byte 0" }

# --- SRAM regions (chapters 7 + 9) ---
# Battery-backed PRG-RAM at $6000-$7FFF holds all canonical game state plus a UI cache.
#
# CHAPTER-9 RECONCILIATION: chapter 7 identified $601A as the 17-fief province table.
# Chapter 9 §4 corrected this — a live SRAM dump showed $6000-$6D1F is essentially
# empty (just 144 bytes of unrelated 16-bit data at $6000-$608F), and the *real*
# live working province table is at $7001. The confirmed record layout is also
# different from chapter 7's assumption: header (base koku) is at offset 24, not 0.
# The $601A label below is kept for historical reference but should be treated as
# either an outdated address or, at most, an unused secondary copy.
"0x6003" = { name = "fief_history_table",   comment = "Per-fief HIGH-WATER MARK table — 17 entries x 8 bytes each (136 bytes total at $6003-$608A). Tracks historical maxes of 4 economic stats so income harvest uses peaks, not current. FULLY DECODED 2026-05-25 from sub $A0A9 in bank 0. Per-slot layout (idx*8 from base $6003): +0=output_max, +2=dams_max, +4=loyalty_max, +6=wealth_max. Each updated via 'if current >= history: history = current' pattern. STRATEGIC IMPLICATION: stats drained by war/Train/tax don't hurt income — the peak is remembered permanently. 'Build everything to max once' is mathematically optimal because the high-water mark drives gold/rice harvest." }
"0x6CF7" = { name = "province_ai_state",     comment = "Per-province GRANT-POLICY byte (0-5, 0xFF=excluded). 0=Home 1=Industrial 2=Military 3=Balanced 4=Farming 5=Direct. The per-fief AI driver ai_per_fief_command_driver ($B89B) switches on it (cases 0-5) to pick that fief's command handler. **[CENSUS-CONFIRMED 2026-06-03, probe-ai-policy-distribution.py] This is a PLAYER affordance, not an AI choice — the AI never picks a style.** Every normal save reads {Home:49, Direct:1}: all 49 AI fiefs sit at 0 (Home) and only the human's own fief is 5 (Direct). States 1-4 appear ONLY in saves where the PLAYER has conquered+granted (they scale with extra Direct fiefs — e.g. VICTORY {0:33,3:10,5:7}, blockade-complete {0:37,2:1,3:5,5:7}). new-game seeds ALL fiefs 0 ($89A3 $89F9); char-creation stamps the player fief 5 ($8694); conquered AI fiefs stay 0. So state 0 = the AI's universal behavior: 0->ai_econ_action_state0->ai_econ_command_dispatch, the RNG-weighted Balanced loop run on EVERY AI fief every turn (per-fief variety comes from resource surplus + RNG + daimyo stats, NOT from policy). Eligibility/ownership plumbing: count_eligible_targets ($8172) requires !=0xFF, province_state_is_FF ($D999) tests ==0xFF; set on ownership change by sub_98A3 ($6CF7[fief]=arg3); player Grant writes via driver_grant ($AF66). [[project_nobunaga_ai_command_pass]]" }
"0x6D2D" = { name = "fief_tax_rate",         comment = "Per-fief TAX RATE byte (0-100), one per province (flat array indexed by fief, NOT in the 26-byte record). CONFIRMED 2026-06-02 (main-turn-loop/planner walk): driver_tax ($99A6) takes &$6D2D[fief], displays it as 'Tax is %d, enter new tax' ($99C2), and writes back number_input(1..100) ($9A3D); the old-new delta drives the loyalty/wealth penalty via effect_tax. Save-dump range 20-64, consistent. USED AS: (a) the income multiplier in the harvest sweep -- gold/rice = pct_op(tax, wealth) + pct_op(tax, pct_op(40, town)) (bank0 $A1E1/$A20C/$A25C), i.e. income is literally tax% of the economic base (this is the harvest memory's 'od_pct'); (b) an event-probability term square_over_2025(100-tax) (bank0 $9DCD) -- this particular roll rises at LOW tax, so it is NOT the high-tax riot; (c) the per-period gate at $A32A: if (tax < 90-skill) province[+12] *= 0.9 (a 0.9x decay of the +12 field -- +12 is loyalty per the high-water map, larger-range; the decay DIRECTION reads counterintuitive (fires at normal/low tax) so recheck the condition vs raw bytecode before doctrine). OPEN: reconcile the +12 loyalty range + the $A32A decay direction (Inbox)." }
"0x6D5F" = { name = "current_season",        comment = "Season-of-year counter (0-3). RUNTIME: ai_strategic_turn_planner ($A47F) does season=(season+1)&3 each period; current_game_year increments only when it wraps to 0 ($A48B/$A48E) -> 4 seasons = 1 year. per_period_fief_daimyo_update_driver ($A36F) switch(season): 1=init_province_highwater_from_records, 2=harvest_income_sweep_all_fiefs (the FALL harvest), 3=normalize_relations_matrix_lower; per_turn_age + natural-death run every season. Planner event-select gates on season==1 ($A4CB). BOOT: byte 0 of the 4-byte config block at $6D5F-$6D65 (init '01 01 02 32'); neighbor $6D63=const_two (Grow's sqrt subtrahend). Renamed from config_block 2026-06-02 (main-turn-loop walk)." }
"0x6D63" = { name = "const_two",            comment = "NOT a constant -- it is the SKILL LEVEL / difficulty knob (1-5), default 2. SET at new-game by init_new_game_state ($8AD6: const_two = number_input(1..5) after 'Please select skill level.'). It is a GLOBAL difficulty multiplier read in ~35 sites across ALL 4 banks. The headline: the 5 development commands all use it as the (6-const_two) numerator term -- Grow gain = 2*floor(amount*(6-const_two)/sqrt(output+amount)) (Build/develop-loyalty/wealth/morale identical shape). EMULATOR-CONFIRMED (probe-skill-impact.py): on one fief, amount 100 -> gain 76/60/46/30/14 for skill 1/2/3/4/5 = a 5.4x swing. So HIGHER skill = LESS development = harder (the long-standing '*5' in the Grow formula was just skill-1's 6-1=5; all earlier cracked formulas are the skill-2 default case). Beyond development it also scales: starting stat boosts (apply_scenario_starting_stat_boosts, const_two*5/*10), AI trade/decision gates ($B8CC 55-const_two*5, $B552 const_two+3), event/uprising magnitude (rng_mod_30=(const_two+1)*10, $A641), and combat casualties/damage (bank2 $9EC1 rng_mod(6-const_two), $9FEE field-=const_two, bank15). DISCOVERED 2026-06-02 (init_new_game_state walk + footprint search). Name kept (high doc blast-radius); rename to skill_level/game_difficulty captured as an Inbox ticket. Byte 4 of the config block at $6D5F (init '01 01 02 32' -> the '02' is skill 2)." }
"0x6F1B" = { name = "daimyo_turn_order",    comment = "Per-season turn-order array (one byte per acting fief, sized to scenario_fief_count -> up to 50 bytes). Re-randomized each season by shuffle_fief_turn_order_array ($A742): scenario_fief_count random transpositions via swap_byte ($A757/$A763). Consumed by ai_per_fief_command_driver ($B918): selected_province_idx = daimyo_turn_order[ai_per_fief_loop_index] picks who acts next within the season. Seeded at new-game init ($89F3). RELOCATED from $6F0B 2026-06-02 (main-turn-loop walk) -- $6F0B has ZERO references in any bank; the real array base used by both the shuffle and the command-driver reader is $6F1B. [[project_nobunaga_turn_order_randomization]]" }
"0x6F5F" = { name = "selected_province_idx", comment = "Word holding the currently-selected province index (0-16 for 17-fief scenario, 0-49 for 50-fief). The 'A4 5F 6F 8B 1A B5 8C 01 70 BB' province-access idiom (chapter 9 §4) reads this, multiplies by 26 (record size), and adds $7001 (table base) to get the record pointer. Appears 81+ times across banks 0/1/2/15. Idx=50 ($7515) is the zealot/uprising slot (header=9999 marks special)." }
"0x6F63" = { name = "battle_defending_province", comment = "Word: the province whose tactical map is loaded for the current battle (the defender's fief). Read by map_populate ($8903, bank 2) to index province_to_mapid_table ($F70E) -> map_id -> tactical_map_cell_pool ($A57E + map_id*55, bank 4). Distinct from selected_province_idx ($6F5F). Seeding this + scenario_fief_count is sufficient to drive the ROM->SRAM map populate (render-rom-to-map.py). Session 2026-05-30." }
"0x6D67" = { name = "rest_turns_remaining",  comment = "Per-daimyo turn-skip counter (Rest command). PINNED 2026-05-30 by driver_rest ($ADB3, Command 17): sets $6D67[d77e()] = number_input(1..10) — 'rest for N turns' (health/age recovery, ch11). The turn loop then: sub_B79B, if $6D67[daimyo]!=0, decrements one and skips the daimyo's command-pick (resting = no action this turn); the war-target planner ($A578) skips flagging a resting daimyo as prey; several other action drivers gate on it too ($8CB2/$902B/$9B52/$9C09/$9057/$B943). I.e. a resting daimyo is inert and untouchable-as-target until the counter drains." }
"0x6D9D" = { name = "scenario_fief_count",   comment = "Word: the active scenario's fief count — 17 or 50. The 17-vs-50 selector the battle map-populate path branches on (sub_DC88: UCMPGT 50). With battle_defending_province ($6F63), the only SRAM input map_populate ($8903) needs. Session 2026-05-30." }
"0x6DD4" = { name = "daimyo_weakness_flag",  comment = "Per-daimyo 0/1 WEAKNESS/CONDITION mark (NOT a pure war-target flag — that was an over-read, see below). WRITER (AI planning pass, bank 0 $A4AB-$A5AF): cleared to 0, then $6DD4[D] |= (rng_mod(400) < (100 - daimyo_health)) for health<=99 daimyo (gates: skip if health>99 at $A56A, or rest_turns_remaining[$6D67][D]!=0 at $A578). So P(marked) = (100-health)/400 per pass — empirically SHAPE-confirmed 2026-05-30 (flagged mean health 66.6 vs 81.9). READ BY TWO SYSTEMS: (a) war-targeting — war_helper_d972 ($D972, 'called only by War', 8 read sites incl. per-fief AI driver $B8A0) treats a marked daimyo as preferred/weak prey; (b) natural-death/health — sub_9154 ($9187) reads it in the death-roll result. RECONCILES the 2026-05-28 5-dump finding that called $6DD4 a chronic-illness/condition flag: it's a per-TURN low-health-weighted mark, but sustained-low-health daimyo (e.g. Saito) get re-marked every turn, so it LOOKS chronic across yearly dumps. **CAUTION (empirical, 2026-05-30): NOT a hard war-immunity gate** — a health>99 daimyo (never marked) was still invaded, so the mark is a PREFERENCE/vulnerability signal that biases AI targeting, not the sole war trigger. Index per-daimyo (writer loops D=0..fief_count, indexes daimyo_table_17[D] via sub_D7CD AND $6DD4[D] by same D; fief-indexed uses ride the scenario identity). Daimyo record +1 = health CONFIRMED via 50Diamyo cross-check (31/38 = start+5). Exact war role pending SRAM-dump confirmation." }
"0x6E15" = { name = "fief_to_daimyo_map",   comment = "17-byte array, position i = current owner-daimyo idx for fief i+1 (1-based). Found 2026-05-25 via SRAM cross-reference. Initial state: identity (fief i+1 owned by daimyo i). After conquests, values change — e.g. when Tokugawa took Owari, position 16 changed from 16 (Oda) to 7 (Tokugawa). Daimyos whose value doesn't appear anywhere have lost their home; they remain in daimyo_table_17 as 'wandering' (status=$01 in chapter 7 terms, vs $00 for fief-holding lords)." }
"0x7515" = { name = "zealot_uprising_slot", comment = "Province-record-format slot (26 bytes, idx=50) for the zealot/Ikko-Ikki uprising force when it spawns. Uses standard 26-byte province record layout so it slots into combat engine without special-casing. Distinguishing markers: header=9999 (special), extreme loyalty/morale (1300/1516 observed), tiny skill/arms (4/4). Cleared after combat resolution. Spawn check likely lives in bank-0 season-turnover code." }
"0x7001" = { name = "province_table_live",  comment = "AUTHORITATIVE live working province table (chapter 9 §4 reconciliation). 17 records x 26 bytes for the 17-fief scenario. Confirmed field layout (offsets, all 16-bit LE since loadA_ind_word reads low-byte-first): +0=gold, +2=debt, +4=town, +6=rice, +8=output, +10=dams, +12=loyalty, +14=wealth, +16=men, +18=morale, +20=skill, +22=arms, +24=header (base koku, the development ceiling). Record N is at $7001 + N*26." }
"0x601A" = { name = "province_table_OLD",   comment = "DEPRECATED — chapter-7 identification, contradicted by chapter 9 §4 SRAM dump. The actual live province table is at $7001 (province_table_live). Kept as a label only to flag chapter-7 references for revisit." }
"0x752F" = { name = "daimyo_table_17",      comment = "17-fief scenario daimyo records — 17 records x 7 bytes. Each: +0 age, +1 Health, +2 Drive, +3 Luck, +4 Charisma, +5 IQ, +6 status/generated-flag. Index parallel to daimyo_name_table at $77A8. Tokugawa is record 7 at $7560. **+6 (status) = the ORIGINAL-vs-GENERATED flag** (0 = original scenario daimyo, 1 = generated/replacement): set to 1 by assign_unique_daimyo_face_code ($DB97) on succession, and read by draw_daimyo_portrait ($E76F) to choose preset (dedicated) vs composite portrait. 50-fief records are the parallel daimyo_defaults table at bank-3 $9532; live SRAM records load from there at new-game." }
"0x7560" = { name = "daimyo_rec_tokugawa",  comment = "Player slot in 17-fief scenario. Record 7 of daimyo_table_17. Format: age + H + D + L + Ch + IQ + status (7 bytes)." }
"0x77A8" = { name = "daimyo_name_table",    comment = "17-fief daimyo names — 17 names x 9 bytes (8 ASCII chars + null pad). Indices parallel to daimyo_table_17. Order in 17-fief scenario: Hatakeyama, Uesugi, Hojo, Honganji, Asakura, Anekoji, Imagawa, Tokugawa, Iera, Tsutsui, Asai, Rokkaku, Kitabatake, Ashikaga, Miyoshi, Takeda, Oda. WHEN A DAIMYO IS DISPLACED AND REGENERATED (via zealot conquest, etc.), this entry is overwritten — sometimes cleanly (e.g. 'Iera' -> 'Saito'), sometimes with partial syllable-overwrite producing garbled names like 'Sate\\0ui' (from 'Tsutsui'). The name regenerator may use a clean-name table with a syllable-stitch fallback." }
"0x7C00" = { name = "map_tile_data",        comment = "Strategic-map background tile indices. ~558 bytes covering the 18x31 map grid." }
"0x7F00" = { name = "ui_transient_state",   comment = "Transient UI cache: frame counter at $7FE9, animation timers, menu position, status flags. Boot bytecode zeroes $7FE7/$7FC7/$7FD3/$7FD1 on game start (chapter 6). NOT preserved across power cycles — only canonical tables survive a save." }
"0x7FE9" = { name = "frame_counter",        comment = "Per-frame counter (60Hz tick). Drives animation timing, cursor blink, music transitions. Continuously incremented when game is unpaused, frozen when paused." }


# --- Data-walk batch 1 (2026-06-01) — RAM/SRAM vars named by code back-reference ---
# Variable-side of the label-walk: named via data-xref.py (who-reads/writes $addr) +
# the now-named referencing subs. CAVEAT on the combat block: written FRAME-RELATIVE
# (opcode $85), so data-xref shows 0 abs-writers — that's expected, not "never written"
# (see [[project_nobunaga_combat_damage_writer_cracked]]).
"0x6FF6" = { name = "combat_arena_x_min",  comment = "[ORACLE-CONFIRMED 2026-06-02] The 4 words $6FF6/$6FF8/$6FFA/$6FFC are NOT damage magnitudes -- they are the tactical-arena BOUNDING RECTANGLE [x_min,y_min,x_max,y_max]. $6FF6 = x_min. Default rect (0,0,10,4) = the 11x5 tactical grid (rand%11 x rand%5). is_coord_in_combat_rect ($970A) tests x in [x_min,x_max] & y in [y_min,y_max]; player_interactive_unit_move_loop + rng_search_combat_rect_for_unit_cell bound movement to it. set_combat_arena_rect_by_approach ($9675) pulls x_min->7 on an EAST approach (attacker enters the east strip). Overturns [[project_nobunaga_combat_damage_formula_decoded]] (the '{1,2,4,7} damage table' were these rect coords). Proof: tools/probe-combat-arena.py." }
"0x6FF8" = { name = "combat_arena_y_min",  comment = "[ORACLE-CONFIRMED 2026-06-02] y_min of the tactical-arena rect (see $6FF6). Default 0; set to 2 on a SOUTH approach (attacker enters the south strip, y in [2,4]). NOTE: the decompiled C's set_combat_arena_rect_by_approach shows the S branch writing 'word_3' -- a VM store-annotation bug; the oracle proves S writes $6FF8 (y_min), N writes $6FFC (y_max). For the teardown." }
