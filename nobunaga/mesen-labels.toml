# --- Bank 0 ---
# Bank 0 is almost entirely VM bytecode + data, not native 6502 code.
# The 3-byte entry at $8000 ('4C 78 A7' = JMP $A778) is essentially the only native code in this bank,
# followed by JSR $E823 at $A778 which enters the VM. Everything after that is bytecode.

[prg.bank0]
"0x8000" = { name = "bank0_entry",          comment = "Bank 0 entry point. 3 bytes: JMP $A778. The 'rest of bank 0' is data — VM bytecode, sprite/tile data, and a few small native helpers callable from bytecode." }
"0xA778" = { name = "vm_bootstrap",         comment = "First instruction reached after RESET. JSR vm_entry ($E823) followed by inline VM bytecode that orchestrates the entire boot sequence (audio init, palette load, screen setup) and ultimately becomes the main game loop." }

