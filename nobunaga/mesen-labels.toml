"0xA3AA" = { name = "write_sram_save_checksum_and_signature", comment = "[HIGH AMENDED 2026-06-10] the WRITE/STAMP side of save integrity: accumulates the syscall-22 checksum over SRAM and STORES it to $7FEB, strcpy's the signature to $7FED, then UI. Sibling of verify_sram_save_integrity ($821E) which READS+compares the same. Proposer's 'compute checksum' missed the store." }
"0xA455" = { name = "ai_strategic_turn_planner", comment = "[HIGH CONFIRMED 2026-06-10] THE AI per-turn driver root (JMP'd from vm_bootstrap): clears daimyo_weakness_flag, gates on $6DA1 bit7, advances period ($6D5F/$6D9F + roll_period_rate_table $924A + sub-driver $A30D), pointer-selects a disaster/event handler ($9CB3/$9D00/$9ED9), builds the event candidate list, then the WAR-TARGET loop at $A581: daimyo_weakness_flag[i] = (rng_mod(400) < (100-health)) | flag = the (100-health)/400 weakest-enemy weighting (matches ai_war_architecture), gated by war_helper_d972 + $8C1E, with daimyo-name war-declaration UI." }
