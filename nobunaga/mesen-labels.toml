"0xD677" = { name = "draw_current_year",        comment = "[HIGH CONFIRMED 2026-06-10] draw_message(0xF6C4, current_game_year) -- printf+draw the current year via msg $F6C4. Was 'draw_window_f6c4' (the value is current_game_year, not a fixed window)." }
"0xD687" = { name = "draw_current_season",      comment = "[HIGH CONFIRMED 2026-06-10] redraw_window with the season string selected by current_season (case 0/1/2/3 -> $F6C7/$F6CE/$F6D5/$F6DA). Renders the Spring/Summer/Fall/Winter banner. (This was a DREAM phi-clobber victim -- always showed $F6C7 -- fixed 2026-06-10; now value-correct.) Was 'redraw_window_f6c7'." }
"0xD73E" = { name = "delay_loop",               comment = "[HIGH] Nested busy-wait: inner counts 240, outer decrements arg1 to 0. A frame/cycle delay. Session C 2026-05-31." }
"0xD78B" = { name = "daimyo_name_width",        comment = "[MED] Computes daimyo_name_table[owner] addr (*9+$77A8) then char_advance_width(44) -- measures/positions a daimyo name. Session C 2026-05-31." }
"0xD7AF" = { name = "draw_daimyo_name",         comment = "[MED] redraw_window on daimyo_name_table ($77A8 + owner*9) -- renders a daimyo's name. Session C 2026-05-31." }
"0xD7CD" = { name = "daimyo_record_addr",       comment = "[HIGH] Returns daimyo record base = arg1*7 + $752F (7-byte per-daimyo PERSON records, distinct from the 26-byte province/fief record at $7001). The daimyo-record accessor (40+ readers via fief_to_daimyo_record_addr/get_daimyo_stat4_by_fief). FIELD MAP (ground-truthed 2026-06-02 via cross-year save-dump comparison + the death-formula code): +0=AGE (CONFIRMED: monotonic +, uniform across all daimyo; check_daimyo_natural_death $9154 gates on age>=70), +1=HEALTH (CONFIRMED: declines over time; same sub uses health/4 in the death roll -> the cracked (age-10-health/4)/300 formula), +2=DRIVE (stable across years; drained -1 on marry-refusal; compared daimyo-vs-daimyo in a COMBAT context bank1 $8EB8), +3=LUCK (CONFIRMED behavior: wanders +/-5 each season via drift_daimyo_luck; marry-drained -- the random walk IS luck fluctuating), +4=CHARISMA (CONFIRMED: rises over time, the HOTTEST-read field ~9 reads -> income variance, event-boon size, event eligibility, marry; get_daimyo_stat4_by_fief), +5=IQ (stable; NOT marry-drained), +6=portrait/status flag (0=preset/historical, 1=composite/generated). Stat names (+2 Drive/+3 Luck/+4 Charisma/+5 IQ) per Chris/manual 2026-06-02. apply_scenario_starting_stat_boosts boosts +1..+5 (the 5 stats) by skill*5, leaving +0/+6. OPEN (footprint-with-combat): full per-stat impact map (which subsystem each of Drive/Luck/Charisma/IQ gates). [[project_nobunaga_daimyo_record_structure]]" }
"0xD7DA" = { name = "fief_to_daimyo_record_addr", comment = "[HIGH] daimyo_record_addr(fief_to_daimyo_map[arg1]) -- the owning daimyo's record for a fief. 21 callers (hot). Session C 2026-05-31." }
"0xD7F7" = { name = "clear_econ_stats_if_no_output", comment = "[HIGH CONFIRMED 2026-06-10] On province arg1's $7001 record: if output (+8) == 0, zero loyalty (+12) and wealth (+14). I.e. when a province loses its economic base, clear its economic-derived stats. Field offsets per the province_table_live ($7001) map. Was 'province_clear_fields_d7f7'." }
"0xD815" = { name = "clear_military_stats_if_no_men", comment = "[HIGH CONFIRMED 2026-06-10] On province arg1's $7001 record (base $7011 = +16): if men (+16) == 0, zero morale (+18), skill (+20), arms (+22). I.e. when a province's army is gone, clear its military stats. Field offsets per the province_table_live ($7001) map. Was 'province_clear_fields_d815'." }

# stat-growth / table accessors / list ops ($D8BA-$DCB2)
"0xD8BA" = { name = "develop_gain",             comment = "[MED] Shared develop-family gain calc: math32_3arg over sqrt_int of two record fields (the floor(amount*5/sqrt(...)) idiom behind Grow/Give-Men). Session C 2026-05-31." }
"0xD8F2" = { name = "develop_gain_capped_loyalty", comment = "[MED 2026-06-10] return min(develop_gain(arg2, arg1+12, arg1+8), arg1->header - arg1->loyalty) -- a development gain clamped to the loyalty headroom (header minus current loyalty). Was 'record_grow_capped_d8f2'. (The +12/+8 field offsets tie to the $7001 province-record map -- pending.)" }
"0xD919" = { name = "develop_gain_capped_wealth",  comment = "[MED 2026-06-10] Sibling of develop_gain_capped_loyalty: return min(develop_gain(arg2, arg1+14, arg1+4), arg1->header - arg1->wealth) -- gain clamped to the wealth headroom. Was 'record_grow_capped_d919'." }
"0xD940" = { name = "record_apply_two_grows",   comment = "[MED] Applies record_grow_capped_d8f2 and _d919 to two fields of a record (loyalty/wealth-like pair). Callers $8379,$8FF8. Session C 2026-05-31." }
"0xD962" = { name = "set_6da1_bit7",            comment = "[MED] Reads byte $6DA1, ORs in 0x80 (sets high/sign bit), stores back. Session C 2026-05-31." }
"0xD982" = { name = "is_ai_count_ge_8",         comment = "[MED 2026-06-10] return ai_player_count >= 8 (a >=8 threshold predicate on the $6E09 daimyo/AI count). Sharpens the old 'compares then returns mem_6E09' note (the comparison IS the return). OPEN: what 8 gates (likely a roster/slot cap). Was 'get_6e09'." }
"0xD98D" = { name = "get_province_ai_state",    comment = "[HIGH] Returns province_ai_state[arg1] ($6CF7+arg1). 37 callers; canonical AI-state getter (pairs with province_state_is_FF). Session C 2026-05-31." }
