"0xD6B8" = { name = "math32_3arg",         comment = "CONFIRMED 2026-05-25: 3-arg math helper computing (arg1 × arg2) / arg3 in 32-bit signed arithmetic. Uses ext-opcodes: $25 sign-extend 16→32, $14 push regA 32-bit, $15 pop into regB, $01 unsigned multiply, $02 signed divide, $27 RTS. Returns -1 if arg3==0. CRITICAL CAVEAT for Grow: callers push only 2 args explicitly (sqrt + neg-const_two); arg3 reads uninitialized stack memory at caller's frame[-4]. Runtime value of arg3 determined by execution history of the caller, not by an explicit push." }
