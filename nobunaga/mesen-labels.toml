# --- The command driver table ---
"0xB9B2" = { name = "command_driver_table", comment = "34-entry pointer table — entry N points to the bytecode subroutine that drives menu command N+1. Entries 0-20 are the 21 lord commands, 21-33 are sub-handlers reachable from within those drivers. See command-table.txt for the full listing. Chapter 9's foundational find." }

# --- The 21 command drivers (in-game menu order) ---
"0x96D1" = { name = "driver_move",          comment = "Command 1 (Move) driver. Relocate troops between own provinces. Calls effect_move ($8CA5) after capacity-check, dest-pick, count-input, lead-personally prompt. Chapter 11." }
"0x9850" = { name = "driver_war",           comment = "Command 2 (War) driver. Launch an attack. Heaviest single driver (154 insns, 19 unique host_call targets). Calls six combat-prep effect handlers ($81FC, $9323, $933A, $9351, $9368, $9814) plus the standard select/prompt cluster. Chapter 11." }
"0x999A" = { name = "driver_tax",           comment = "Command 3 (Tax) driver. Set tax rate. Calls effect_tax ($82D6) twice — once after the rate input, once for the peasantry-reaction result. Chapter 11." }
"0x9A5D" = { name = "driver_send",          comment = "Command 4 (Send) driver. Transfer rice/gold between own provinces. Calls effect_send ($8BE5). Chapter 11." }
"0x9B7E" = { name = "driver_dam",           comment = "Command 5 (Dam) driver. Build dam infrastructure to raise output. Calls effect_dam ($87D8) and helper_dam_rounding ($887D). Two-effect command. Chapter 10 + 11." }
"0x9C4F" = { name = "driver_pact",          comment = "Command 6 (Pact) driver. Form a non-aggression pact. Diplomacy subsystem. Chapter 11." }
"0x9D3D" = { name = "driver_grow",          comment = "Command 7 (Grow) driver. Raise province output. The fully-traced reference command (Chapter 9). Driver handles the cost (debits gold from province) and silent preconditions (header >= output blocks; gold == 0 blocks). Calls effect_grow ($87F0) for the actual stat changes." }
"0x9DC4" = { name = "driver_marry",         comment = "Command 8 (Marry) driver. Alliance by marriage. Costs gold (demanded by target), outcome not guaranteed. Chapter 11." }
"0xA1B6" = { name = "driver_trade",         comment = "Command 9 (Trade) driver. Trade with a passing merchant. Calls effect_trade ($8A15). Requires a merchant present. Chapter 11." }
"0xA5F4" = { name = "driver_hire",          comment = "Command 10 (Hire) driver: prompts (Men/Ninja)? (ui_helper_d351 msg_men_ninja). Men -> effect_hire_variant_pay $A553 (recruit soldiers, dilute army stats). Ninja -> effect_ninja_sabotage $A2D2 (buy a ninja, run a sabotage mission). Chapter 11." }
"0xA637" = { name = "driver_train",         comment = "Command 11 (Train) driver. Raise lord's skill against a header-derived cap. Calls effect_train ($9586). Chapter 10 + 11." }
"0xA6C7" = { name = "driver_view",          comment = "Command 12 (View) driver. Inspect a fief; spy on others (costs gold, can fail). Heaviest non-War driver (189 insns). Calls FOUR effect handlers ($83FA, $85A7, $85EA, $A6B3) — different sub-behaviors. Chapter 11." }
"0xA853" = { name = "driver_build",         comment = "Command 13 (Build) driver. Raise province town. Same prompt-and-apply shape as Grow. Calls effect_build ($88A6). Chapter 10 + 11. THIS SESSION: effect walked side-by-side with Grow as structural diff." }
"0xAA1F" = { name = "driver_give",          comment = "Command 14 (Give) driver. Charity → loyalty/morale. Touches the MOST province fields of any command — calls THREE effect handlers ($A93A, $A95E, $A9D5). Chapter 11." }
"0xAAAE" = { name = "driver_bribe",         comment = "Command 15 (Bribe) driver. Bribe a target's fields. Chapter 11." }
"0xAD67" = { name = "driver_assign",        comment = "Command 16 (Assign) driver. Place a retainer. Calls effect_assign ($AC11). Chapter 10 + 11." }
"0xADB3" = { name = "driver_rest",          comment = "Command 17 (Rest) driver. Skip turns to recover (health/age interplay). Chapter 11." }
"0xAF38" = { name = "driver_map",           comment = "Command 18 (Map) driver. Render the strategic map. 18 instructions, no prompt, no cost — pure display. Calls map_helper_e5f2 + $AF10. Chapter 11." }
"0xAF66" = { name = "driver_grant",         comment = "Command 19 (Grant) driver. Set a province's policy state. Chapter 11." }
"0xB23E" = { name = "driver_other",         comment = "Command 20 (Other) driver — settings/save menu. Chapter 11." }
"0xB2A1" = { name = "driver_pass",          comment = "Command 21 (Pass) driver. End the turn. Five instructions. Chapter 11." }

