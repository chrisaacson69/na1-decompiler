"0xD309" = { name = "clear_rect_left_lower",      comment = "[HIGH AMENDED 2026-06-10] BLANKS a rect with tile $01: ppu_fill_rect_wrap(2,20,9,26,1) = cols 2-9, rows 20-26 (left-side panel, lower); 15 callers. Old comment had args reversed + miscategorized. Renamed from ui_draw_window_d309." }
