# selection / record-address helpers ($D586-$D815)
"0xD586" = { name = "count_decimal_digits",      comment = "[HIGH CONFIRMED 2026-06-10] return number of base-10 digits in arg1: while(arg1){arg1/=10; n++}; return n (0 for arg1==0). Used to right-size/position a number for display. Renamed from count_div_iterations_d586 (behavioral)." }
"0xD609" = { name = "ui_prompt_redraw",         comment = "[MED] UI prompt helper: reads ui state (cc7b/cc89/cce1), redraw_window, wait_button_edge. 5 callers. Session C 2026-05-31." }
