"0xDF73" = { name = "transfer_force_triplet",   comment = "[MED] 3-iteration copy of a word triplet (via scaled_transfer_da24) into the $7013 army/force region; selected->defending force transfer. Session C 2026-05-31." }
"0xDFBC" = { name = "clamp_field_6d2d_to_30",   comment = "[MED] For each tax-flagged fief (tax_helper_db12), caps the per-fief byte $6D2D at 30. ($6D2D unlabeled; init to 20 by init_new_daimyo_province_stats.) Session C 2026-05-31." }
"0xDFFE" = { name = "cap_arms_at_index",        comment = "[MED 2026-06-10] cap = arg2->arms/50 + 20; if the $76AB[arg1] entry (stride 5) EXCEEDS cap, spill the excess (old-cap) into $76A9[arg1] and clamp $76AB[arg1] to cap. Caps a per-index arms value, moving overflow to the paired $76A9 table. Sharpens the old note ('if set' -> 'if > cap'). Was 'update_arms_table_dffe'." }
"0xE03C" = { name = "apply_conquest_outcome",   comment = "[HIGH] Post-battle conquest orchestrator: rewrites the defending province stats from battle scratch ($6F7D-$6F87), updates fief_to_daimyo_map, calls daimyo_stat_transfer + reassign/neutralize helpers, caps via cap_fief_stats. Session C 2026-05-31." }
"0xE1E7" = { name = "clear_fief_pair_matrix",    comment = "[HIGH CONFIRMED 2026-06-10] Plays sound 29 (call_bank10_entry), then zeroes BOTH the row and column of fief arg1 in the symmetric 54-stride fief×fief matrix at $6193 (clears [i][arg1] and [arg1][i] for all i < scenario_fief_count) -- removes fief arg1 from the pairwise adjacency/relations grid. Renamed from clear_fief_pair_6193 (drop addr suffix); sharpened (it clears a whole row+col, + the sound)." }
"0xE21B" = { name = "install_new_daimyo",       comment = "[HIGH] Installs a new daimyo on a fief: fief_to_daimyo_map[fief] = list_op_6e4a(0xFF), province_ai_state=0, $6DA2=0, then confirm_prompt. Session C 2026-05-31." }
"0xE275" = { name = "announce_daimyo_death",     comment = "[HIGH CONFIRMED 2026-06-10] The \"a daimyo was killed\" announcement: clear_fief_pair_matrix(arg1) (remove the fief from the pairwise grid + sound 29), message_display(daimyo_name_table + fief_owner(arg1)*9) (the slain lord's name), redraw_window(msg_was_killed); if the province is still active, draw_message(msg_in_fief_2d_in_the_year_d, arg1+1, current_game_year); confirm_prompt(). Was 'prompt_helper_e275' (wrong-category)." }
"0xE2AF" = { name = "copy_arms_record_5",       comment = "[MED] Copies a 5-byte record from arg2 into $76A9 + arg1*5 (the per-fief arms/force record, stride 5). Session C 2026-05-31." }
"0xE2D6" = { name = "draw_daimyo_name_menu",    comment = "[MED] Thin wrapper: ui_helper_d134(daimyo_name_table $77A8, $F77F) -- renders the daimyo-name list/menu. Session C 2026-05-31." }
"0xE425" = { name = "find_fiefs_of_owner",      comment = "[HIGH] Resolves arg1->daimyo (ui_helper_d772) then scans all fiefs collecting those with the same owner. Session C 2026-05-31." }
"0xE454" = { name = "neutralize_fief",          comment = "[MED] If province_ai_state != 0xFF: set state = -1, clear $6DA2, $6D2D = 20, copy_arms_record_5, recompute (find_record_9e3c). Depose/neutralize a fief. Session C 2026-05-31." }
"0xE4A2" = { name = "build_owned_fief_list",     comment = "[HIGH CONFIRMED 2026-06-10] Builds the $6F89 list of fiefs passing get_6da2_cur(): iterate selected_province_idx 0..scenario_fief_count, append each that passes, FF-terminate; saves/restores selected_province_idx. (Same $6F89 candidate buffer build_eligible_province_list writes.) Renamed from build_owned_fief_list_6f89 (drop addr suffix)." }
