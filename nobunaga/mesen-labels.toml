"0xD14E" = { name = "poll_input",               comment = "[HIGH] Controller-poll state machine (switch on mem_7FD3), indexes the input/selection table at $7FD5, returns a button code via syscall_dispatch(...,6)=read_controller. THE cursor/input handler (confirms prior analysis); 11 callers. Session C 2026-05-31." }
