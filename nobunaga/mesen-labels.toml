"0xD7EA" = { name = "selected_province_daimyo_record", comment = "[CONFIRMED 2026-06-02] Returns fief_to_daimyo_record_addr(selected_province_idx) — the ACTIVE/attacker daimyo's 7-byte record. Used by ai_sum_battle_strength as the attacker side of the daimyo-stat comparison (vs the defending province's record); also 4 other drivers. (was ui_helper_d7ea.)" }
"0xE510" = { name = "ui_helper_e510",      comment = "Helper called by 5 drivers (Send, Pact, View, Marry — the 'select target province from a list' command set). Candidate: cursor/menu enter primitive." }
"0xD77E" = { name = "ui_helper_d77e",      comment = "Helper called by 5 drivers (Marry, Pact among them). TBD." }
"0xCB5E" = { name = "min_word",            comment = "Tiny 11-instruction function: min(arg1, arg2) as signed words. Returns smaller of the two via cmp_slt + branch. The cap mechanism behind 'morale caps at koku', 'dams cap at 100', etc. Heavily used by the field-cap-sweep at $D836 and by command-post-cleanups (Build, Grow, etc. — anywhere a stat needs to be clamped to a ceiling)." }
"0xD351" = { name = "ui_helper_d351",      comment = "Helper called by 4 drivers (Hire — chapter 11 notes the Men/Ninja type prompt routes through this). Candidate: 2-choice prompt." }
