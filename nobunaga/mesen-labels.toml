"0xD9D3" = { name = "redraw_window_row",        comment = "[MED 2026-06-10] redraw_window(0x7985 + arg1*10) -- draws the arg1-th entry of a 10-byte-stride row/string table at $7985. (The $7985 table's exact contents still open.) Was 'draw_window_row_7985'." }
"0xD9E5" = { name = "test_6f65_bit7",           comment = "[MED] Returns true if bit7 of byte $6F65+arg1 is NOT set. Session C 2026-05-31." }
"0xD9F7" = { name = "revolt_type_message",       comment = "[HIGH CONFIRMED 2026-06-10] return ($7B79[arg1] == 7) ? msg_christns_f6f5 : msg_rioters_f6fe -- picks the uprising-type message string for province arg1 (the $7B79 byte: 7 = Christian uprising, else rioters/peasant revolt). Was 'classify_7b79'." }
"0xDA24" = { name = "scaled_force_transfer",    comment = "[MED 2026-06-10] return min_word(pct_op(arg1, math32_2arg(arg4,arg3)) + pct_op(arg2|1, math32_2arg(arg3,arg4)), arg5) -- a proportional split of two quantities by a ratio (the two math32 terms are the complementary proportions arg3:arg4), clamped to arg5. Callers effect_move + transfer_force_triplet -> computes a transferred force/resource amount. Was 'scaled_transfer_da24'. OPEN: exact per-arg roles (which is men vs ratio)." }
"0xDAAB" = { name = "load_daimyo_relation_row",  comment = "[MED 2026-06-10] Loads daimyo arg1's 8-byte relation row (stride 8) from the bank-4 scenario relation table (scenario_fief_count==17 ? relation_base_data_8300 : relation_base_data_8004) into the $6F4F buffer, returns $6F4F. Sharpens the old 'returns base $6F4F' note -- it FILLS the buffer first (the SRAM load was missed). Was 'relation_base_6f4f'." }
"0xDB4B" = { name = "draw_owner_name",          comment = "[MED] Maps fief->owner (ui_helper_d772) then redraw_window on daimyo_name_table ($77A8 + owner*9). Session C 2026-05-31." }
"0xDB6E" = { name = "draw_province_lord_name",   comment = "[HIGH CONFIRMED 2026-06-10] If province arg1 has an owner (province_ai_state[arg1] != 255): redraw_window(daimyo_name_table + fief_owner(arg1)*9) -- the owner's name; else redraw_window(msg_no_lord). Was 'draw_window_f706'. (This was the DREAM phi-clobber that surfaced the fix -- 4-c used to always draw msg_no_lord; now value-correct.)" }
"0xDB97" = { name = "assign_unique_daimyo_face_code", comment = "[HIGH 2026-06-01] The REPLACEMENT-daimyo portrait generator (called only by install_new_daimyo $E21B = death/succession). First SETS daimyo_record[+6] = 1 (the generated flag, so draw_daimyo_portrait takes the composite path), then rolls a unique base-5 RNG face code (rng_mod(5)*125 + *25 + *5 + *1 = 4 base-5 digits), dup-rejected vs the $6EB1 word table, stored at the owner slot. compose_upload_daimyo_portrait ($8086) later splits it into feature digits for the bank-8 composite face. The ORIGINAL 50 never run this -> they keep record[+6]=0 and the preset dedicated portrait. (was assign_unique_id_6eb1.)" }
"0xDC0E" = { name = "pool_push_pop",            comment = "[HIGH CONFIRMED 2026-06-10] Stack op on the $6E4A pool (sp=$6E4A, elements @ $6E4B): if arg1<=49 PUSH arg1 (sp++ then store), else (sentinel >49) POP (sp-- then return [sp]). Confirms the old count-prefixed-list note as a push/pop stack keyed on arg1. 6 sites. Elements are ids 0-49 (fief range) -- the 'daimyo_pool' var label may be a misnomer; flag. Was 'list_op_6e4a'." }
"0xDC3C" = { name = "list_remove_matching",     comment = "[HIGH CONFIRMED 2026-06-10] Scans the $6E7F list (scenario_fief_count entries) and marks every entry == arg1 as 0xFF (remove-by-value). Confirms the old note. 6 sites. Purpose of the $6E7F list itself still open. Was 'list_remove_6e7f'." }
"0xDC66" = { name = "fief_to_mapid",            comment = "[HIGH] Returns province_to_mapid_table[arg1] (arg1==0 passthrough; scenario_fief_count==50 selects extended path). Session C 2026-05-31." }
"0xDC88" = { name = "read_map_cell",            comment = "[HIGH] sram_wrap read of a tactical map cell: $A57E + fief_to_mapid(battle_defending_province)*55 + row(arg2)*11 + col(arg1). The per-cell map source (matches the ROM->Map $A57E finding). Session C 2026-05-31." }
"0xDCB2" = { name = "generate_daimyo_name",     comment = "[HIGH] Daimyo NAME GENERATOR: RNG-picks a row from each syllable table ($F930, $F95D), concatenates into a buffer, rejects duplicates vs daimyo_name_table ($77A8) via strcmp. The regenerator hypothesized in the $77A8 comment. Session C 2026-05-31." }

# conquest / territory-transfer machinery + misc ($DD81-$E6B9)
"0xDD81" = { name = "init_new_daimyo_province_stats", comment = "[HIGH] Seeds a freshly-conquered province + new daimyo: daimyo byte = rng_mod(20)+20; per-field pct_op(rng+base) scaling; town($700D)+=50, rice($7013)+=50; $6D2D=20. Session C 2026-05-31." }
"0xDE78" = { name = "select_uprising_message", comment = "[HIGH CONFIRMED 2026-06-10] Picks the uprising/rebellion message for province arg1: if ai_turn_flags&32 -> msg_rebels_f72e; elif ai_turn_flags&16 -> $796A; else switch arg1: {7,23}->$F720, {13,30}->$F728 (specific provinces/sites), default -> revolt_type_message(arg1). 5 sites. Was 'select_message_string_de78'." }
"0xDEC1" = { name = "reassign_fiefs_to_conqueror", comment = "[HIGH] Loops all fiefs; those owned by the defending daimyo get fief_to_daimyo_map[fief] = conqueror and $6DA2 cleared. Post-conquest ownership transfer. Session C 2026-05-31." }
