"0x9E73" = { name = "resolve_attack_apply_casualties", comment = "[EMULATOR-CONFIRMED 2026-06-02, probe-combat-casualty.py] The combat attack as a CAPTURE/DEFECTION CONTEST. Body arg1=target enemy unit-slot (0-4), arg2=men committed (reverse-push display). atk_score = rng(6-skill) + morale(atk_prov,+18) + charisma(atk_daimyo,+4); def_score = morale(def_prov,+18) + charisma(def_daimyo,+4) + 2*skill. If atk_score>def_score, captured = pct_op(math32_2arg(atk_score, atk_score-def_score), enemy_slot_strength) men move from the enemy's slot to the attacker's slot 0 (cap recipient<=9999); if 0 or contest lost, enemy province morale -= skill instead. Charisma is the decisive combat stat (can dominate morale). Subsequent draws are UI; stub them to run headless." }
