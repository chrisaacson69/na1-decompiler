"fp-37" = { name = "tile_buf", comment = "[HIGH] byte tile buffer; its addr (fp-37) passed to ppu_copy_rect_wrap(...,(fp-37),4); fp-5 writes classified chars into it" }
"fp-5" = { name = "buf_ptr", comment = "[HIGH] word write-cursor into tile_buf; init=(fp-37), pre-incremented, *(buf_ptr)=char_classify(cur_char) per char" }
"fp-3" = { name = "cur_char", comment = "[HIGH] byte: current char from msg string arg1; tested ==10 (newline) and passed to char_classify before buffering" }

[vars.bank15."0xCB80"]
# swap_byte
"fp-1" = { name = "tmp_byte", comment = "[HIGH] swap temp: holds byte read from *arg1 ($CB87), written into *arg2 ($CB92) & returned; classic byte-swap holder" }

