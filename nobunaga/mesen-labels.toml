# Mesen 2 labels for Nobunaga's Ambition (NES, USA, 1989).
# Source of truth for all named addresses discovered across the annotation chapters.
# Apply with:  python ../tools/mesen-labels.py mesen-labels.toml

[meta]
rom_name = "Nobunaga's Ambition (USA)"
prg_bank_size = 0x4000     # 16 KB MMC1 banks
prg_bank_count = 16        # 256 KB total


# ============================================================================
# Zero-page and main RAM ($0000-$07FF, CPU-visible)
# ============================================================================

[ram]

# --- Shared scratch pointer pool (chapter 2) ---
"0x0000" = { name = "ptr0_lo",            comment = "General scratch pointer LO (project-wide default; 13 of 16 banks touch this)" }
"0x0001" = { name = "ptr0_hi",            comment = "General scratch pointer HI" }
"0x0002" = { name = "ptr1_lo",            comment = "Pointer pair LO; reset-init to $FF (forms $05FF with $03)" }
"0x0003" = { name = "ptr1_hi",            comment = "Pointer pair HI; reset-init to $05" }
"0x0004" = { name = "ptr2_lo",            comment = "Pointer pair LO" }
"0x0005" = { name = "ptr2_hi",            comment = "Pointer pair HI" }
"0x0006" = { name = "ptr3_lo",            comment = "Pointer pair LO (second-busiest indirect after ptr0)" }
"0x0007" = { name = "ptr3_hi",            comment = "Pointer pair HI" }

# --- PPU pipeline pointers (chapter 2) ---
"0x001C" = { name = "ppu_queue_a_lo",     comment = "Pointer LO into $0020 (PPU upload queue A?); reset-init = $20" }
"0x001D" = { name = "ppu_queue_a_hi",     comment = "Pointer HI; reset-init = $00 (forms $0020)" }
"0x001E" = { name = "ppu_queue_b_lo",     comment = "Pointer LO into $0030 (queue B?); reset-init = $30" }
"0x001F" = { name = "ppu_queue_b_hi",     comment = "Pointer HI; reset-init = $00 (forms $0030)" }

# --- BRK dispatcher state (chapters 1, 2) ---
"0x0050" = { name = "brk_dispatch_id",    comment = "Task ID for next BRK; IRQ handler reads this and indirect-JMPs through $C173+id*3" }
"0x0066" = { name = "brk_scratch_lo",     comment = "Cleared on every BRK dispatch entry" }
"0x0067" = { name = "brk_scratch_hi",     comment = "Cleared on every BRK dispatch entry" }
"0x0068" = { name = "brk_jmp_target_lo",  comment = "IRQ-computed indirect JMP target LO; reused later as general data-pointer LO (byte-meaning-by-context)" }
"0x0069" = { name = "brk_jmp_target_hi",  comment = "IRQ-computed indirect JMP target HI; reused as data-pointer HI" }

# --- Controller poll (chapter 3) ---
"0x006E" = { name = "p1_buttons",         comment = "P1 held buttons (ABSS UDLR, MSB-first); written by controller_poll ($C628) every NMI" }
"0x006F" = { name = "p2_buttons",         comment = "P2 held buttons (same format)" }

# --- PPU register shadows (chapter 3) ---
"0x0071" = { name = "ppuctrl_shadow",     comment = "PPUCTRL ($2000) shadow; the codebase never reads $2000 directly. Managed by $C6A6 ($C54F/nmi_off, $C68A/nmi_on)." }
"0x0072" = { name = "ppumask_shadow",     comment = "PPUMASK ($2001) shadow; managed by $C570 ($C567/rendering_on, $C69D/rendering_off)." }
"0x0073" = { name = "kernel_var_73",      comment = "Cleared at reset; used by $C6AD (the BRK multiply-by-3 helper)" }

# --- Subsystem flags and counters (chapters 1, 2, 3) ---
"0x0074" = { name = "palette_dirty",      comment = "Non-zero = palette upload pending; $C6D4 uploads $0700-$071F to PPU $3F00-$3F1F then clears this" }
"0x0079" = { name = "music_voice_idx",    comment = "Outer-loop voice index (0-4) during music driver scan" }
"0x007A" = { name = "music_ptr_lo",       comment = "Pointer LO into current voice record at $0734+N*9 ($7A/$7B)" }
"0x007B" = { name = "music_ptr_hi",       comment = "Pointer HI into current voice record" }
"0x0080" = { name = "skip_vblank_wait",   comment = "Non-zero = $C537 (wait-for-VBlank) returns immediately without spinning" }
"0x0081" = { name = "nmi_busy",           comment = "Semaphore: foreground sets to 1, spin-waits for NMI to clear it. The 'wait for VBlank' handshake." }
"0x0083" = { name = "clock_a_hi",         comment = "16-bit wall-clock A high byte; NMI adds +2 every frame (gated by $89); reset = $04 (init $04D2 = 1234)" }
"0x0084" = { name = "clock_a_lo",         comment = "Wall-clock A low byte; reset = $D2" }
"0x0085" = { name = "clock_b_hi",         comment = "16-bit wall-clock B high byte; reset = $04" }
"0x0086" = { name = "clock_b_lo",         comment = "Wall-clock B low byte; reset = $D2" }
"0x0089" = { name = "skip_wallclock",     comment = "Non-zero = NMI does OAM/audio/input but skips the wall-clock tick" }
"0x00B0" = { name = "nmi_skip_all",       comment = "Non-zero = NMI bails after OAM DMA (skips controller/palette/audio/clock)" }

# --- Music driver state ($0720-$0760, chapter 3 + runtime trace) ---
"0x0720" = { name = "audio_mute_triangle", comment = "Non-zero = triangle channel writes suppressed (for sound-effect ducking)" }
"0x0721" = { name = "audio_active_v0",     comment = "Voice 0 active flag (always $01 during song playback)" }
"0x0722" = { name = "audio_active_v1",     comment = "Voice 1 active flag" }
"0x0723" = { name = "audio_active_v2",     comment = "Voice 2 active flag" }
"0x0724" = { name = "audio_active_v3",     comment = "Voice 3 active flag" }

# Voice config array: 5 × 3-byte records starting at $0725, written by audio_load_voice (task $09).
# Chapter 3 mis-identified $0730-$0733 as a "song header" — they are actually the tail of voices 3-4 here.
# Each 3-byte record: { tempo_divider, song_ptr_lo, song_ptr_hi } per voice.
"0x0725" = { name = "v0_config",           comment = "Voice 0 config (3 bytes: tempo_div, song_ptr_lo, song_ptr_hi); written by audio_load_voice ($C3AD)" }
"0x0728" = { name = "v1_config",           comment = "Voice 1 config (3 bytes)" }
"0x072B" = { name = "v2_config",           comment = "Voice 2 config (3 bytes)" }
"0x072E" = { name = "v3_config",           comment = "Voice 3 config (3 bytes)" }
"0x0731" = { name = "v4_config",           comment = "Voice 4 config (3 bytes)" }

# Voice slots: 5 records × 9 bytes starting at $0734.
# Per-record fields (offsets 0-8): trigger / vol-duty / sweep / timer-lo / timer-hi / tempo-div / ptr-lo / ptr-hi / countdown.
"0x0734" = { name = "v0_trigger",          comment = "Voice 0 byte 0: 1-4 = play on channel; 5-8 = just played (dormant); 0 = idle" }
"0x073D" = { name = "v1_trigger",          comment = "Voice 1 byte 0 (same encoding)" }
"0x0746" = { name = "v2_trigger",          comment = "Voice 2 byte 0" }
"0x074F" = { name = "v3_trigger",          comment = "Voice 3 byte 0" }
"0x0758" = { name = "v4_trigger",          comment = "Voice 4 byte 0" }

# --- Palette buffers (chapters 3 + 4) ---
"0x0090" = { name = "palette_alt",         comment = "32-byte alt palette buffer ($0090-$00AF). Used by palette_swap ($C36C, task $12) to atomically swap with palette_shadow for fade/transition effects. Reset-fill $3E (paired with palette_shadow)." }
"0x0700" = { name = "palette_shadow",      comment = "32-byte palette shadow ($0700-$071F); foreground writes here + sets palette_dirty; $C6D4 uploads to PPU $3F00 next NMI. Reset-fill $3E (medium grey)." }


# ============================================================================
# PRG-ROM bank 15 (the fixed kernel at CPU $C000-$FFFF)
# ============================================================================

[prg.bank15]

# --- Vectors and boot ---
"0xC000" = { name = "reset_handler",       comment = "Reset entry: MMC1 init via 5-write serial commit; RAM/OAM clear; APU enable; ends with JMP $8000" }
"0xC0DA" = { name = "nmi_handler",         comment = "NMI/VBlank handler: OAM DMA from $0600, P1+P2 polls, palette upload, music tick, wall-clock tick; bracketed by nmi_off/nmi_on" }
"0xC139" = { name = "irq_handler",         comment = "IRQ/BRK dispatcher: reads brk_dispatch_id, indirect-JMPs through 23-entry table at $C173" }
"0xC173" = { name = "syscall_dispatch_table", comment = "23-entry JMP table (3 bytes each). Dispatched by syscall_dispatch ($F226) via the task ID at brk_dispatch_id ($0050). Chapter 4 renamed from 'BRK dispatch' — the mechanism uses PHP+JMP($FFFE), not BRK." }

# --- The 23 syscall handlers (chapter 4) ---
# These are the targets of the JMP entries at $C173+id*3.
# Each handler reads its parameter block from $0050-$0065 (struct copied from caller's ($02/$03) by syscall_dispatch),
# returns values via brk_scratch_lo/hi ($66/$67), and RTS's back into syscall_dispatch_return ($F23C).
"0xC1B8" = { name = "syscall_wait_for_nmi", comment = "Task $13 (id=19): set nmi_busy=1, spin until NMI clears it. The canonical 'wait for next VBlank' primitive." }
"0xC1C3" = { name = "syscall_rng_next",     comment = "Task $11 (id=17): 48-bit shift-and-add transform of the wall-clock state ($0083-$0088). Returns 16-bit pseudo-random value in brk_scratch_lo/hi. The game's RNG." }
"0xC22C" = { name = "syscall_memcpy_banked", comment = "Task $10 (id=16): bank-switched memcpy. Switches to struct[2] bank, copies (struct[6:8]) -> (struct[8:10]) for length struct[10..11] (16-bit). Restores bank." }
"0xC264" = { name = "syscall_ppu_upload_block", comment = "Task $01 (id=1): bank-switched bulk copy from PRG-ROM to PPU. Switches to struct[2] bank, copies chunks of 16 bytes from (struct[6:8]) to PPU @struct[8:10]; chunk count = struct[10]. Restores bank." }
"0xC2CB" = { name = "syscall_set_sprite",   comment = "Task $03 (id=3): write 1 OAM sprite. struct[2]=sprite index (0-63), struct[6]=Y, struct[8]=attr, struct[a]=tile, struct[4]=X. Writes to OAM shadow at $0600 + idx*4." }
"0xC2F0" = { name = "syscall_fill_attr_quadrant", comment = "Task $08 (id=8): fill 64 bytes of PPU attribute table. PPUADDR = $23C0 + struct[2]*4. Fill byte = struct[4]." }
"0xC312" = { name = "syscall_fill_nametable", comment = "Task $05 (id=5): fill a full 30x32 nametable with one tile byte. struct[2] selects nametable; struct[4] = fill byte. Writes 960 bytes." }
"0xC339" = { name = "syscall_call_bank",    comment = "Task $07 (id=7): save current bank, switch to struct[2], JSR $8000 (the bank's entry point), restore. The inter-bank call primitive." }
"0xC34C" = { name = "syscall_palette_write", comment = "Task $04 (id=4): write one palette byte. struct[2]=palette index (0-31), struct[4]=color. Writes to palette_shadow + sets palette_dirty. If skip_vblank_wait is set, writes to palette_alt instead (no NMI flag)." }
"0xC36C" = { name = "syscall_palette_swap", comment = "Task $12 (id=18): atomically swap palette_shadow ($0700-$071F) with palette_alt ($0090-$00AF), gated by struct[2] XOR skip_vblank_wait. Resolves chapter-3 mystery about $0090-$00AF — it's the alt palette buffer for fade/transition effects." }
"0xC39E" = { name = "syscall_read_controller", comment = "Task $06 (id=6): read controller button state. struct[2]=player index (0=P1 from $006E, 1=P2 from $006F). Returns held buttons in brk_scratch_lo. Side effect: if any button pressed, sets skip_wallclock — game-time pauses while input is held." }
"0xC3AD" = { name = "syscall_audio_load_voice", comment = "Task $09 (id=9): set voice config. struct[2]=voice index, struct[4]=tempo_div, struct[6]=song_ptr_lo, struct[8]=song_ptr_hi. Writes 3 bytes at $0725 + voice*3 (the voice config array)." }
"0xC3CF" = { name = "syscall_audio_control", comment = "Task $0A (id=10): audio control. struct[2]=voice idx, struct[4]=mode. Mode 0: silence everything (clear all voice flags + records, mute SQ1/SQ2/TRI). Mode 1: mute triangle for voice (set audio_mute_triangle+idx, clear voice trigger). Mode 2: query mute state (returns audio_mute_triangle+idx)." }
"0xC428" = { name = "syscall_ppu_blit_from_bank", comment = "Task $14 (id=20): bank-switched PPU blit. Switches to bank from struct[$E] (= $005E), then writes a block from that bank to a nametable region. Used for screen content rendering (menus, maps)." }
"0xC437" = { name = "syscall_ppu_blit_nobank", comment = "Task $0C (id=12): sibling of syscall_ppu_blit_from_bank but enters with mode flag = 0 (no bank switch). Falls into the same code at $C439." }
"0xC4E0" = { name = "syscall_ppu_render_rect", comment = "Task $0D (id=13): 2D nametable region renderer. struct[6/8]=start (x,y), struct[10/12]=end (x,y), struct[14]=per-tile param. Loops through every cell calling 3 helpers ($C640 compute-addr, $C673 compute-attr, $C711 write). Used for menu borders, status panels, map sections — anything with per-tile variation." }
"0xC5AA" = { name = "syscall_sram_block_with_checksum", comment = "Task $16 (id=22): SRAM block read/write with 16-bit checksum. Writes 5-bit value (struct[2]) to MMC1 CHR-bank-0 register at $BFFF (SOROM WRAM-enable gate), copies ($56)->$0200 of length struct[10], writes second 5-bit value (struct[4]) to $BFFF, copies $0200->($56) while computing checksum into brk_scratch_lo/hi. The save-data I/O primitive." }
"0xC60C" = { name = "syscall_set_chr_bank0_reg", comment = "Task $15 (id=21): write 5-bit value (struct[2]) to MMC1 CHR-bank-0 register at $BFFF. On SOROM, bit 4 of this register is the WRAM-enable gate; this syscall is the bracket call that opens/closes SRAM access around save I/O." }
"0xC577" = { name = "set_prg_bank",         comment = "MMC1 PRG bank switch helper. Saves NMI state, writes the 5-bit serial sequence to $FFF0 to set the bank, restores NMI state. Updates kernel_var_73 ($0073) to track current bank. Used by every bank-switching syscall." }

# --- PPU register shadow API (chapter 3) ---
"0xC54F" = { name = "nmi_off",             comment = "Clear bit 7 of ppuctrl_shadow (disable NMI generation); used as the NMI re-entry guard" }
"0xC567" = { name = "rendering_on",        comment = "OR $18 into ppumask_shadow (enable BG + sprite rendering)" }
"0xC570" = { name = "write_ppumask",       comment = "Write A to PPUMASK ($2001) and update ppumask_shadow" }
"0xC68A" = { name = "nmi_on",              comment = "Set bit 7 of ppuctrl_shadow (enable NMI generation)" }
"0xC693" = { name = "ppu_safe_gate",       comment = "Composite preamble for foreground PPU updates: nmi_off → wait_vblank → rendering_off" }
"0xC69D" = { name = "rendering_off",       comment = "AND $E7 into ppumask_shadow (clear BG + sprite enable; blank screen)" }
"0xC6A6" = { name = "write_ppuctrl",       comment = "Write A to PPUCTRL ($2000) and update ppuctrl_shadow" }
"0xC537" = { name = "wait_vblank",         comment = "Spin until PPUSTATUS bit 7 set; early-out if skip_vblank_wait ($0080) non-zero. Calls music_driver during spin." }

# --- NMI subsystems (chapter 3) ---
"0xC628" = { name = "controller_poll",     comment = "Strobe $4016 and shift 8 bits into $006E (P1) or $006F (P2); X = player index" }
"0xC6AD" = { name = "mul_xy_by_3",         comment = "Helper used by BRK dispatcher: multiply X register by 3 with carry, used to scale task ID to table offset" }
"0xC6D4" = { name = "palette_upload",      comment = "If palette_dirty != 0: blank screen, set PPUADDR=$3F00, copy 32 bytes from palette_shadow to PPUDATA, restore rendering, clear palette_dirty" }
"0xC7A5" = { name = "music_driver",        comment = "NMI music tick. Calls trigger pass at $C7AC, then sequencer pass at $C817, then RTS. (Disasm6 misread this region as a data table.)" }
"0xC7AC" = { name = "music_trigger_pass",  comment = "Pass 1: scan 5 voices at $0734; for any voice with byte 0 in 1..4, write 4 APU register bytes and set byte 0 = byte 0 + 4 (one-shot)" }
"0xC7DE" = { name = "music_voice_check",   comment = "Per-voice trigger check: skip if byte 0 is 0 (idle) or >= 5 (dormant), else call music_voice_play" }
"0xC7EF" = { name = "music_voice_play",    comment = "Per-voice play: compute APU base from byte 0, optionally skip if triangle mute, write bytes 1-4 to APU registers" }
"0xC817" = { name = "music_sequencer_pass", comment = "Pass 2: for each active voice, decrement byte 8 (duration countdown). When zero, advance song pointer (bytes 6-7), load new pitch (bytes 3-4), trigger (byte 0), reset countdown (byte 8)." }
