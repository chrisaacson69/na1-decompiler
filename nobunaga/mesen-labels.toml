"0xDD3A" = { name = "filter_province_list_by_owner", comment = "[HIGH CONFIRMED 2026-06-10] In-place filter of a province-id list: walks out_list (FF-terminated), keeps each province whose is_enemy_owned(p) matches arg1 (match_enemy) AND that still exists (!province_state_is_FF), into a scratch buf, FF-terminates, then writes buf back over out_list (syscall16_sram_wrap bank 0). NOT a 'combat pre-roll' (wrong-category) -- a list-prune by ownership. Was 'combat_helper_dd3a'." }
"0xD972" = { name = "fief_owner_weakness",  comment = "[HIGH CONFIRMED 2026-06-10] Accessor: return daimyo_weakness_flag[fief_owner(arg1)] (body @ $D977) -- the weakness/condition mark of the fief's owning daimyo. Data accessor, NOT a 'war helper' (wrong-category, like fief_owner/selected_province_owner); built on the grounded fief_owner leaf. 9 sites. Semantic of daimyo_weakness_flag itself still inherited from its var label." }
"0xD59D" = { name = "select_province_by_cursor", comment = "[HIGH CONFIRMED 2026-06-10] select_province_by_cursor(min,max): the number/cursor province picker -- prompts for a value in [min,max] and returns it (the shared selection primitive behind the command prompts)." }
"0xD3ED" = { name = "cursor_nav_loop",     comment = "Menu/cursor navigation loop: switch(sub_D14E()) on NES button bits (1=R,2=L,16=Start,32=Sel,64=B,128=A) to move the selection cursor over candidates. The war-target PICK bottoms out HERE — controller input, not a target-scorer (read 2026-05-31). AI drives the same path via sub_D14E's AI branch." }
"0xD9B7" = { name = "is_enemy_owned",      comment = "Candidate target predicate: returns (fief_to_daimyo_map[ui_helper_d77e()] == arg) — i.e. the candidate fief's owner matches the target daimyo (enemy-ownership match). Eligibility, not strength. Read 2026-05-31." }
"0xD999" = { name = "province_state_is_FF", comment = "Returns ($6CF7[arg1] == 0xFF) — province is in the EXCLUDED state. Eligibility filter used by combat_helper_dd3a. Read 2026-05-31." }
"0xCBBD" = { name = "syscall16_sram_wrap", comment = "Thin wrapper around syscall 16 (sram_block_checksum/copy). Called by combat_helper_dd3a after filtering the candidate list — plumbing, not scoring. Read 2026-05-31." }
"0xE3A4" = { name = "prompt_diplomacy_pact",    comment = "[HIGH CONFIRMED 2026-06-10] Pact negotiation prompt: if the defender is AI, draws the pact menu (draw_daimyo_name_menu(msg_pact)), demands gold (number_input up to 9999), and runs the accept/reject flow. The diplomacy negotiation UI. (was diplomacy_helper.)" }
"0xDA4F" = { name = "set_pact_relation",   comment = "[HIGH CONFIRMED 2026-06-10] Sets the relations_matrix ($6193 stride-54) cell between selected_province_idx and battle_defending_province to 70 -- establishing a non-aggression pact. (was diplomacy_helper2.)" }
"0xDA7D" = { name = "set_marriage_relation",   comment = "[HIGH CONFIRMED 2026-06-10] Sets the relations_matrix ($6193) cell between the two daimyo (selected_province_owner / fief_owner(defender)) to 90 -- the marriage alliance bond. (was diplomacy_helper3.)" }
"0xE4DC" = { name = "build_fiefs_excluding_daimyo", comment = "[MED 2026-06-10] build_owned_fief_list() into $6F89, then compact it in place keeping only fiefs whose owner (fief_owner) != arg1 -- the owned fiefs NOT held by daimyo arg1. Used in the marriage flow (candidate target list excluding a given daimyo's holdings). Was 'marry_helper_e4dc'." }
"0xE315" = { name = "marriage_pact_handler", comment = "[MED 2026-06-10] Marriage-pact logic, two paths on whether battle_defending_province has an owner. OWNED (interactive): set ui_input_mode=2, draw_daimyo_name_menu(msg_marriage_pact) + redraw_window(msg_accept) + prompt_y_n; on yes, demand gold via number_input(1..9999); returns the entered amount (0 on decline). UNOWNED (auto/AI): 50% gate (rng_mod 2), then weakness/rng test (fief_owner_weakness(selected) or rng_mod(3)); if the province's $7001 stat > 200 returns pct_op(stat, rng_mod(30)+50)+200, else 0. Was 'marry_helper_e315'." }
"0xE76F" = { name = "draw_daimyo_portrait", comment = "[HIGH 2026-06-01] Draws the daimyo portrait (stat-roll/info screens; caller sets active_province_idx_copy $6F5B first). Loads a 4-entry palette, then BRANCHES on the daimyo record's status/generated flag (record[+6], the 7th byte of daimyo_table_17): flag==0 (an ORIGINAL scenario daimyo) -> PRESET path: descriptor table at $BBD0 (graphics bank, NOT the string bank the decompiler resolves it to) indexed by fief_to_mapid*4, read 8 bytes, upload that daimyo's DEDICATED portrait CHR to $15B0; flag==1 (a GENERATED/replacement daimyo) -> COMPOSITE path: unpack_record_to_sram_e6b9 builds the base-5 face from $6EB1. Then blits the 8x8 portrait. THIS is why the original 50 have fixed faces (preset) while death-replacements get random composite faces. (was the mislabeled 'marry_helper_e76f'.)" }
"0xCC35" = { name = "palette_swap",        comment = "[HIGH CONFIRMED 2026-06-10] return syscall_palette_swap(arg1) -- 1-op forward to the native palette-swap syscall (body @ $CC3A: PUSH local12; CALL syscall_palette_swap; RETURN). NOT marriage-related: 'marry_helper_cc35' was wrong-category (it appears in effect/marriage screens that swap palettes, e.g. palette_swap(1)/palette_swap(0) bracketing palette_write_wrap blocks). 91 call sites." }
"0xCC69" = { name = "clear_rect_right_panel", comment = "[HIGH CONFIRMED 2026-06-10] ppu_fill_rect_wrap(22, 7, 29, 18, 1) -- blanks the right-side panel (cols 22-29, rows 7-18) with tile $01. A fixed-geometry clear, sibling of clear_rect_top_strip/left_upper/left_lower. NOT trade-specific (wrong-category). Was 'trade_helper_cc69'." }
"0xDB35" = { name = "increment_ai_player_count", comment = "[MED 2026-06-10] ai_player_count++; if (is_ai_count_ge_8()) set_6da1_bit7(). Bumps the daimyo/AI count and sets the $6DA1 bit-7 flag once it reaches 8 (the >=8 threshold). NOT a UI helper (wrong-category). Was 'ui_helper_db35'." }
"0xDB12" = { name = "defender_owner_is_keyed_daimyo", comment = "[MED PROBABLE 2026-06-10] Combat predicate (NOT tax -- wrong-category): return fief_owner(battle_defending_province) == (scenario_fief_count==17 ? 3 : 20). I.e. is the defending province owned by the scenario's keyed daimyo (index 3 in the 17-fief scenario, 20 in the 50-fief). OPEN: confirm who daimyo 3/20 is (likely the scenario protagonist/Nobunaga) via the daimyo table. Was 'tax_helper_db12'." }
"0xD759" = { name = "standard_delay",      comment = "[HIGH CONFIRMED 2026-06-10] return delay_loop(delay_loop_count) -- 2-op wrapper (PUSH $6D65 delay_loop_count; CALL $D73E delay_loop; RETURN @ $D75E). Runs the standard configurable busy-wait; delay_loop_count ($6D65) is the user-adjustable message-speed setting. 3 callers. Was 'ui_helper_d759'." }
"0xD772" = { name = "fief_owner",          comment = "[HIGH CONFIRMED 2026-06-10] return fief_to_daimyo_map[fief] -- 5-op accessor (LOADL 12 fief; LOADR_imm2 $6E15 fief_to_daimyo_map; ADD; BYTE_DEREF; RETURN @ $D777). Takes a fief id, returns its owning daimyo id. Was 'ui_helper_d772' (low-fidelity: NOT a UI helper, a data accessor; the 'fief->owner' note scattered in other comments is now ground-truthed)." }
"0xE5F2" = { name = "render_map_section",  comment = "[HIGH CONFIRMED 2026-06-10] The strategic-map SECTION renderer. If arg1 != the current section: palette_swap(1); clear the right margin (ppu_fill_rect 30,4..31,19); ppu_copy_rect the section's 28x16 tilemap (strategic_map_section_tilemaps + arg1*0x1C0, bank 4) to cols 2-29 rows 4-19; ppu_upload_block the section's 32-byte attribute table (strategic_map_section_attributes + arg1*32 -> PPU $23C8); mark selected_record_idx_9e3c=arg1; then walk the section's 34-byte record list and draw every fief's lord name (draw_province_lord_name); palette_swap(0). A 'map section' = tilemap(0x1C0) + attributes(32) + fief records(34). 8 sites. Was 'map_helper_e5f2'. The graphics-thread keystone; see ch.16/19." }
