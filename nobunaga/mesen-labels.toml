"0xCA52" = { name = "rng_mod",             comment = "rng_next() mod arg1. 6-instruction bytecode wrapper: bails with 0 if arg1<1, else calls rng_next_wrapper ($CA46), then mod_signed by arg1. Returns 0..arg1-1 if rng is positive. Used by Train (X=ca52(20) for skill gain, Y=ca52(10) for Luck/IQ bonus check), and likely Marry too." }
"0xCA46" = { name = "rng_next_wrapper",    comment = "3-instruction wrapper around syscall #17 (syscall_rng_next at $C1C3). Pushes 17 via op_8D_sbyte, fires syscall_dispatch, returns the 16-bit pseudo-random value. The bytecode-accessible entry point to the game's RNG." }
