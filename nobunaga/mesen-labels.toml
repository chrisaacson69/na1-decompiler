"0xAD86" = { name = "halve_defender_morale_for_breaching_attackers", comment = "[HIGH CONFIRMED 2026-06-10] For each ATTACKER unit (is_unit_present(side 0, slot 0..4)) standing ON a placeable cell (bit 32 set: !is_cell_clear_of_bits(unit_col,unit_row,32)), halves the DEFENDER's morale ($7013 + battle_defending_province*26, = the $7001 record's +18 morale field) and shows display_morale_falling_message. CORRECTS prior note: the loop is over ATTACKER (side-0) units, not the defending province's; the cell test is ON-bit-32 (placeable/breach), not 'NOT on a blocked cell'. (was 'halve_defender_province_stat_for_exposed_units'.)" }
