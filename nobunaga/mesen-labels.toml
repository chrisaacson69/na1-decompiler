"0xC83D" = { name = "music_voice_step",      comment = "Per-voice sequencer tick (called from music_sequencer_pass for active voices). If stream byte < 5: load note (music_load_note). Else: countdown record[8] via music_dec_duration; on expiry, music_next_event drives the next stream event." }
"0xC857" = { name = "music_load_note",       comment = "Start a note: music_load_voice_cfg then write 4 note-parameter bytes (from the stream) into record offsets [0,1,2,4] via music_read_stream_byte." }
"0xC877" = { name = "music_load_voice_cfg",  comment = "Copy the voice's 3-byte instrument config from v0_config[voice_idx*3] ($0725) into record offsets [5,6,7] (bank + stream pointer)." }
"0xC894" = { name = "music_read_stream_byte", comment = "Banked song-stream fetch: save current bank, switch to record[5] (song bank), read one byte via the record[6,7] pointer, increment that pointer (record[6,7]), restore bank. Returns byte in A. The cross-bank stream reader the whole driver runs on." }
"0xC8C4" = { name = "music_dec_duration",    comment = "Decrement record[8] (note-duration countdown) and store back. Returns Z when it hits zero (time for next event)." }
"0xC8CE" = { name = "music_next_event",      comment = "Process one stream event: music_read_stream_byte; if < $F0 it's a note -> music_set_pitch + music_set_duration; if >= $F0 it's a command -> music_handle_command. Loops until a playable event is set." }
"0xC8E4" = { name = "music_handle_command",  comment = "Stream control byte >= $F0. $F0 = note-off (silence the APU channel for this voice, clear its active flag, return C set = stop). Other values fall through to music_restart_stream (pattern loop/restart)." }
"0xC906" = { name = "music_restart_stream",  comment = "Reload the 3-byte voice config into record[5,6,7] and clear record[0] — i.e. restart the voice's pattern stream from its configured start (the loop command target). jmp-reached from music_handle_command." }
"0xC929" = { name = "music_set_pitch",       comment = "Convert note -> APU timer period via music_note_to_period, then splice the period hi/lo into record[3,4] (the channel's timer bytes), preserving the low control bits of record[4]." }
"0xC94B" = { name = "music_note_to_period",  comment = "Note byte -> 16-bit APU period in $7E/$7F: low nibble indexes the 12-entry base-period table tab_c96f (2 bytes each); high nibble is the octave (right-shift the period that many times)." }
"0xC990" = { name = "music_set_duration",    comment = "Read the next stream byte (note length), shift left 3 (x8 = ticks), store into record[8] (the duration countdown)." }

# Reset-path PPU init (adjacent to the audio block; NOT audio). Sole caller: reset_handler.
"0xC757" = { name = "reset_ppu_init",        comment = "Reset-path PPU init: ppu_safe_gate, then upload $30 bytes from tab_c775 to PPU $0000, then screen_on. Walked 2026-05-31; was the pre-identified b15_c757." }

# ----------------------------------------------------------------------------
# Bank-15 math + UI primitives (chapters 9-11, this-session decode)
# Called pervasively from bank-1 command handlers via host_call. Decoded by
# walking the bytecode subroutines in disasm/bank_15_vm.asm.
# ----------------------------------------------------------------------------

"0xCBCD" = { name = "sqrt_int",            comment = "Integer square root (native code; chapter 9). Classic restoring algorithm, 2 bits per iteration, 8 iterations over 16-bit input. Called as host_call sqrt_int, $02 with one word arg on the data stack. Used by Grow/Dam/Build/Train effects to drive the diminishing-returns curve." }
"0xD70D" = { name = "pct_op",              comment = "Percentage operator (bytecode sub; this session fully decoded). Computes base * pct / 100 with integer truncation, split-by-10 so no intermediate product exceeds 16 bits. Args: arg1=base, arg2=pct. Fast path: if pct==100 return base. Otherwise return (base/10)*(pct/10) + (base%10)*pct/100 + (pct%10)*(base/10)/10. Used by all redistribution tails (Grow drains loyalty+dams, Build drains wealth, Tax response, etc.)." }
"0xD6B8" = { name = "math32_3arg",         comment = "CONFIRMED 2026-05-25: 3-arg math helper computing (arg1 × arg2) / arg3 in 32-bit signed arithmetic. Uses ext-opcodes: $25 sign-extend 16→32, $14 push regA 32-bit, $15 pop into regB, $01 unsigned multiply, $02 signed divide, $27 RTS. Returns -1 if arg3==0. CRITICAL CAVEAT for Grow: callers push only 2 args explicitly (sqrt + neg-const_two); arg3 reads uninitialized stack memory at caller's frame[-4]. Runtime value of arg3 determined by execution history of the caller, not by an explicit push." }
"0xD6DE" = { name = "math32_2arg",         comment = "2-arg extended-opcode math helper (bytecode sub). Returns 0 if both args are 0. Similar B7-prefix shape to math32_3arg but with ext_op $19 (a different multiply/scale primitive). Called by Grow/Build for a refinement step. EXACT formula pending ext-opcode decode." }

"0xD326" = { name = "message_display",     comment = "Display a message string. Called by 30 distinct command drivers — the most-used helper in the lord-command menu. Args: typically a 16-bit string pointer pushed before the call. The 'show feedback prompt' primitive." }
"0xD766" = { name = "confirm_prompt",      comment = "Show a confirmation prompt (likely 'OK?' / yes-no). Called by 22 drivers. Common tail of any command that has a destructive or committal step." }
"0xCEC4" = { name = "redraw_window",       comment = "Redraw a screen region / window. Called by 17 drivers. The 'restore display after my prompts' primitive." }
"0xD5E9" = { name = "number_input",        comment = "Number-input prompt with cap. Called by 15 drivers (Tax rate, Grow amount, Send rice/gold, etc.). Args appear to include the maximum allowed value — Chapter 9 noted the Grow input is capped at the province's gold." }
"0xCC89" = { name = "ui_helper_cc89",      comment = "UI helper called by 14 drivers. Specific role TBD — appears in command pre-roll/post-roll. Candidate: cursor-restore or selection-reset." }
"0xD134" = { name = "ui_helper_d134",      comment = "Helper called by 13 drivers. Often follows message_display. Candidate: format-and-print (the '%d' / '%s' substitution layer)." }
"0xD3A7" = { name = "ui_helper_d3a7",      comment = "Helper called by 8 drivers. TBD." }
"0xE80C" = { name = "ui_helper_e80c",      comment = "Helper called by 15 drivers. TBD." }
