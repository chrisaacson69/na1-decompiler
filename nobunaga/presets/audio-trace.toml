# Preset: audio-trace
# Watches the music-driver state region and marks every write into it.
# Use this when you want to see exactly how the music sequencer advances
# (which voice, when byte 8 hits zero, when bytes 3-4 get loaded with new pitch).
#
# Apply with:
#   python ..\tools\mesen-workspace.py presets\audio-trace.toml

[meta]
rom_name = "Nobunaga's Ambition (USA)"

[preset]
name = "audio-trace"
description = "Voice records + writes to $0720-$0760"

[watches]
expressions = [
    "[song_active]",
    "[song_tempo]",
    "[song_base_lo]",
    "[song_base_hi]",
    "[audio_mute_triangle]",
    "[v0_trigger]",
    "[v1_trigger]",
    "[v2_trigger]",
    "[v3_trigger]",
    "[v4_trigger]",
]

[[breakpoints]]
type = "write"
start = 0x0720
end = 0x0760
mark_only = true
comment = "Mark every write to the audio state region (mute flags + voice records)"
